id: will-contest
title: "Estate of {decedent_full_name}: Will Contest ({plaintiff_last} v. {defendant_last})"
practice_area: probate
case_type: will_contest
status: active
docket_prefix: PE

downstream:
  repo: maine-probate-forms
  example_forms: [DE-101, DE-301, PP-401]

jurisdiction:
  state: ME
  county: random
  court_type: Probate Court

# A Maine FORMAL TESTACY proceeding contesting a decedent's will (18-C M.R.S. art. 3).
# A late-in-life will left most of the estate to one caregiver-child or a new companion,
# disinheriting the others. A disinherited adult child contests it for lack of
# testamentary capacity, undue influence, and improper execution, and asks the court to
# deny probate of the contested will and admit a prior will (or distribute by intestacy).
# This is a WILL contest about a testamentary instrument -- DISTINCT from the
# improvident-transfer case, which voids an inter vivos DEED under 33 M.R.S. ch. 20.
parties:
  client_role: plaintiff
  attorney: true
  roles:
    - {key: decedent, label: "Decedent (testator)", with_contact: false, with_dob: true}
    - {key: plaintiff, label: "Contestant (disinherited adult child)"}
    - {key: defendant, label: "Proponent (the favored beneficiary / named personal representative)"}
    - {key: other_party, label: "Another interested heir"}

dates:
  filing_date: {date_between: ["2025-04-01", "2026-02-01"]}
  event_date: "{date_of_death}"

facts:
  date_of_death: {date_between: ["2024-06-01", "2025-10-31"]}
  estate_value: {int_between: [300000, 4200000]}
  contested_will_date: {date_between: ["2023-06-01", "2024-05-31"]}
  prior_will_existed: {pick: [true, false]}
  prior_will_date: {date_between: ["2009-01-01", "2018-12-31"]}
  favored_beneficiary: {pick: ["the youngest child who became the caregiver", "a late-life romantic companion", "a neighbor who managed the decedent's affairs", "one of several children"]}
  share_to_favored: {pick: ["nearly the entire estate", "the family home and most liquid assets", "a disproportionate share"]}
  capacity_concern: {pick: ["advancing dementia at the time of signing", "heavy medication after a hospitalization", "cognitive decline following a stroke"]}
  execution_irregularity: {pick: ["only one witness was present", "the witnesses did not see the testator sign", "the will was signed at the beneficiary's kitchen table", "no self-proving affidavit"]}
  isolation_alleged: {pick: [true]}
  drafting_attorney_used: {pick: [true, false]}

third_parties:
  count: {min: 3, max: 5}
  pool:
    - {type: healthcare_provider, name_kind: person, role: "Decedent's treating physician", relevance: "Treated the decedent around the time the contested will was signed and can speak to the decedent's cognition and testamentary capacity."}
    - {type: witness, name_kind: person, role: "Attorney or notary who oversaw the will signing", relevance: "Supervised or notarized execution of the contested will and can testify to the circumstances and who was present at signing."}
    - {type: witness, name_kind: person, role: "Attesting witness to the contested will", relevance: "Signed the will as an attesting witness and can speak to whether the testator signed in the witnesses' presence."}
    - {type: witness, name_kind: person, role: "Second attesting witness to the contested will", relevance: "The other attesting witness, relevant to whether the execution requirements of 18-C M.R.S. § 2-502 were satisfied."}
    - {type: family_member, name_kind: person, role: "Another sibling and heir of the decedent", relationship: "Sibling of the contestant and child of the decedent", relevance: "An interested heir who supports denying probate of the contested will."}
    - {type: financial_institution, name_kind: bank, role: "Bank or financial advisor for the estate accounts", relevance: "Holds or managed the decedent's accounts and estate assets whose records show the favored beneficiary's involvement."}
    - {type: witness, name_kind: person, role: "Caregiver or home health aide for the decedent", relevance: "Provided in-home care and can speak to the decedent's condition and the favored beneficiary's access and control."}

fact_pattern:
  summary: "{plaintiff_full_name}, a disinherited adult child of {decedent_full_name}, brings a formal testacy proceeding in {county} County Probate Court to deny probate of a will dated {contested_will_date} that left {share_to_favored_lower} to {favored_beneficiary_lower}, alleging the testator lacked testamentary capacity, was subject to undue influence, and that the will was not properly executed."
  narrative:
    - "{decedent_full_name} died on {date_of_death}, leaving an estate worth roughly ${estate_value}. {defendant_full_name} has offered for probate a will dated {contested_will_date} and seeks appointment as personal representative. That will leaves {share_to_favored_lower} to {favored_beneficiary_lower}, while {plaintiff_full_name} and {other_party_full_name}, the decedent's other children, take little or nothing."
    - "The contested will was made late in the decedent's life, at a time when the decedent was experiencing {capacity_concern_lower}. {plaintiff_first} alleges that the favored beneficiary cultivated a relationship of trust and dependence, isolated the decedent from family, and arranged the new will to the beneficiary's own advantage. {plaintiff_first} further alleges the will was not validly executed -- {execution_irregularity_lower} -- so it does not satisfy the requirements of 18-C M.R.S. § 2-502."
    - "{plaintiff_first} therefore petitions for formal testacy under 18-C M.R.S. § 3-401 et seq., asking the court to deny probate of the {contested_will_date} will for lack of testamentary capacity, undue influence, and improper execution. In a contested formal proceeding the proponent must prove due execution, while the contestants bear the burden on incapacity and undue influence, 18-C M.R.S. § 3-407. {plaintiff_first} asks the court to admit the decedent's earlier will instead, or, if none controls, to distribute the estate by intestacy."
  undisputed:
    - "{decedent_full_name} died on {date_of_death} domiciled in {county} County, Maine."
    - "{defendant_full_name} has offered a will dated {contested_will_date} for formal probate and seeks appointment as personal representative."
    - "{plaintiff_full_name} is an adult child and heir of the decedent with standing to contest the will."
  disputed:
    - "Whether the decedent had testamentary capacity when the {contested_will_date} will was signed, 18-C M.R.S. § 2-501."
    - "Whether the contested will was the product of undue influence by the favored beneficiary."
    - "Whether the will was executed in conformity with 18-C M.R.S. § 2-502 and, if applicable, whether an earlier will controls under 18-C M.R.S. § 2-507."
  timeline:
    - {date: "{prior_will_date}", event: "The decedent executed an earlier estate plan said to provide for the children more equally."}
    - {date: "{contested_will_date}", event: "The decedent executed the contested will favoring {favored_beneficiary_lower}."}
    - {date: "{date_of_death}", event: "{decedent_full_name} died, and the contested will was offered for probate."}
    - {date: "{filing_date}", event: "Petition for formal testacy and to contest the will prepared for filing in {court_location} Probate Court."}

interview:
  interviewer: "Intake Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Goal", question: "What outcome are you hoping for in contesting the will?", answer: "I want the court to reject the last will. It does not reflect what my parent actually wanted. If there is an earlier will, that one should stand; otherwise the estate should pass the normal way among us children."}
    - {topic: "The will", question: "What does the contested will say, and how is it different from before?", answer: "The will from {contested_will_date} gives {share_to_favored_lower} to {favored_beneficiary_lower}. That is a complete reversal from how my parent always said things would be divided among the family."}
    - {topic: "Capacity", question: "What was your parent's condition when that will was signed?", answer: "Around that time my parent was dealing with {capacity_concern_lower}. There were good days and bad days, but I do not believe my parent understood what that document did or who it cut out."}
    - {topic: "Influence", question: "What makes you think there was undue influence?", answer: "The beneficiary moved in close, took over the finances and the calls, and kept the rest of us at a distance. By the end we could barely reach our own parent without going through them."}
    - {topic: "Execution", question: "Do you have concerns about how the will was signed?", answer: "Yes. From what we have learned, {execution_irregularity_lower}. It was not done the careful way you would expect for something this important."}
    - {topic: "Risk", question: "How do you feel about the cost and the family strain of a contest?", answer: "It is painful to fight with family, and I know it is not cheap. I am willing to push this if the facts hold up, but I would rather resolve it sensibly than turn it into a war."}

objectives:
  goals:
    - "Deny probate of the {contested_will_date} will for lack of testamentary capacity, undue influence, and improper execution."
    - "Have the decedent's prior will admitted, or, if none controls, have the estate distributed by intestacy."
    - "Expose the favored beneficiary's undue influence and isolation of the decedent and ensure a fair distribution among the heirs."
  priorities:
    - "Building a clear record on capacity at the time of signing and on the execution defects."
    - "Documenting the confidential relationship and the isolation of the decedent."
    - "Protecting and accounting for the estate's assets during the contest."
  risk_tolerance: moderate
  desired_outcomes:
    - "An order denying probate of the contested will and admitting the prior will or directing intestate distribution."
    - "A fair share of the estate restored to the disinherited children."
  non_starters:
    - "Any resolution that lets the contested will stand on its current terms."
  constraints:
    budget: {pick: ["Moderate; willing to fund a capacity expert and depositions but wants costs proportionate to the estate.", "Measured; prefers a negotiated family resolution but will try the contest if the evidence supports it."]}
    timeline: "Wants the will contest resolved before the estate is distributed under the contested will."

issues:
  count: {min: 4, max: 6}
  pool:
    - {issue: "Lack of testamentary capacity at the time the will was signed", category: probate, governing_law: "18-C M.R.S. § 2-501", sub_questions: ["Did the testator understand the nature of the act, the property, and the natural objects of the testator's bounty?", "Does the medical and cognitive evidence around the signing show a lack of capacity?"], strength: moderate, client_position: "The testator's cognitive condition left {plaintiff_first}'s parent without the capacity required to make a valid will."}
    - {issue: "Undue influence by the favored beneficiary", category: probate, governing_law: "18-C M.R.S. § 3-407; common law undue influence", sub_questions: ["Was there a confidential relationship coupled with suspicious circumstances?", "Did the beneficiary's influence overcome the testator's free will?"], strength: moderate, client_position: "The favored beneficiary used a confidential relationship and the decedent's isolation to procure a will serving the beneficiary's own interests."}
    - {issue: "Due execution of the contested will", category: probate, governing_law: "18-C M.R.S. § 2-502", sub_questions: ["Was the will signed by the testator and attested by at least two competent witnesses?", "Did the witnesses witness the signing or the testator's acknowledgment as the statute requires?"], strength: moderate, client_position: "The will was not executed in conformity with the statute, so it cannot be admitted to probate."}
    - {issue: "Allocation of the burdens of proof in a contested formal testacy proceeding", category: probate, governing_law: "18-C M.R.S. § 3-407", sub_questions: ["Has the proponent carried the burden of proving due execution?", "Have the contestants carried the burden on incapacity, undue influence, fraud, duress, mistake, or revocation?"], strength: strong, client_position: "The proponent cannot prove due execution, and the contestants can meet their burden on incapacity and undue influence."}
    - {issue: "Effect of a self-proved will and the absence of a self-proving affidavit", category: probate, governing_law: "18-C M.R.S. § 2-504", sub_questions: ["Was the will accompanied by a valid self-proving affidavit?", "If not, must the proponent prove execution through the attesting witnesses?"], strength: moderate, client_position: "The will is not self-proved, so the proponent must prove its execution through live testimony that the irregularities undermine."}
    - {issue: "Whether a prior will controls or the estate passes by intestacy", category: probate, governing_law: "18-C M.R.S. § 2-507; 18-C M.R.S. § 3-401 et seq.", sub_questions: ["Was the prior will validly executed and never revoked?", "If the contested will is denied probate, does the prior will or intestacy govern?"], strength: moderate, client_position: "If the contested will fails, the decedent's earlier will should be admitted, or the estate should pass by intestacy."}
    - {issue: "Order of formal probate and supervision of the administration", category: probate, governing_law: "18-C M.R.S. § 3-401 et seq.", sub_questions: ["Should the court adjudicate testacy in a formal proceeding?", "Should administration be supervised to protect the estate during the contest?"], strength: moderate, client_position: "The court should resolve testacy formally and supervise the administration to safeguard the estate."}

experts:
  count: {min: 1, max: 3}
  pool:
    - {field: "Geriatric psychiatry / neuropsychology", credentials: "M.D.", retained_by: plaintiff, topic: "Testamentary capacity at the time the will was signed", opinion: "At the time of execution, the testator's cognitive condition impaired the capacity to understand the nature of the act, the extent of the property, and the natural objects of the testator's bounty.", basis: "Review of the contemporaneous medical and cognitive records and the surrounding circumstances."}
    - {field: "Forensic document examination", credentials: "D-ABFDE", retained_by: plaintiff, topic: "The signature on and execution of the contested will", opinion: "The signature and execution of the contested will present irregularities inconsistent with a routine, properly witnessed signing.", basis: "Examination of the original instrument, exemplar signatures, and the execution circumstances."}
    - {field: "Estate-planning standard of care", credentials: "J.D.", retained_by: defendant, topic: "Customary practice for drafting and executing a will", opinion: "The drafting and execution of the will conformed to the customary standard of care for the circumstances.", basis: "The drafting file, the execution ceremony, and prevailing estate-planning practice."}

evidence:
  count: {min: 4, max: 7}
  pool:
    - {title: "The contested will and any self-proving affidavit", type: document, party: defendant, description: "The will dated {contested_will_date} offered for probate, together with any self-proving affidavit."}
    - {title: "The decedent's prior will", type: document, party: plaintiff, description: "The earlier will the contestant says should control if the contested will is denied probate."}
    - {title: "The decedent's medical and cognitive records around the signing", type: medical_record, party: plaintiff, description: "Records and evaluations bearing on the decedent's capacity around the time the contested will was executed."}
    - {title: "The drafting attorney's file and notes", type: document, party: defendant, description: "The drafting file, intake notes, and execution records for the contested will."}
    - {title: "Affidavits from the attesting witnesses", type: affidavit, party: defendant, description: "Sworn statements from the witnesses about the circumstances of the will's execution."}
    - {title: "The decedent's financial records showing the beneficiary's involvement", type: financial_record, party: plaintiff, description: "Account and asset records reflecting the favored beneficiary's access to and control of the decedent's finances."}
    - {title: "Correspondence showing isolation or control", type: correspondence, party: plaintiff, description: "Letters, messages, and notes reflecting the beneficiary's control over contact with the decedent."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 3, max: 5}
  amounts:
    - {label: "Value of the estate", amount: {int_between: [300000, 4200000]}, basis: "Approximate value of the decedent's estate at death."}
    - {label: "Value of the share diverted to the favored beneficiary", amount: {int_between: [150000, 4000000]}, basis: "Portion of the estate the contested will leaves to the favored beneficiary."}
    - {label: "Contestant's intestate or prior-will share", amount: {int_between: [0, 1400000]}, basis: "The share the contestant would take under a prior will or by intestacy."}
    - {label: "Estimated cost of the capacity and document experts", amount: {int_between: [15000, 90000]}, basis: "Retained capacity and forensic document examiners."}

litigation:
  posture: pleadings
  causes_of_action:
    - {count: 1, claim: "Lack of testamentary capacity", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "18-C M.R.S. § 2-501; 18-C M.R.S. § 3-407", elements: ["The testator executed the contested will", "While lacking the capacity to understand the nature of the act, the property, and the natural objects of the testator's bounty", "Due to the testator's cognitive condition at the time of signing", "Rendering the will invalid"], relief_sought: "An order denying probate of the contested will for lack of testamentary capacity", strength: moderate}
    - {count: 2, claim: "Undue influence", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "18-C M.R.S. § 3-407; common law undue influence", elements: ["A confidential relationship between the testator and the favored beneficiary", "Susceptibility of the testator to influence", "Opportunity and disposition of the beneficiary to exert influence", "A will that reflects the influence rather than the testator's free will"], relief_sought: "An order denying probate of the contested will as the product of undue influence", strength: moderate}
    - {count: 3, claim: "Improper execution (failure to satisfy 18-C M.R.S. § 2-502)", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "18-C M.R.S. § 2-502", elements: ["The contested will was not signed by the testator and attested by at least two competent witnesses as required", "The witnesses did not witness the signing or the testator's acknowledgment as the statute requires", "The instrument therefore does not meet the statutory execution requirements", "Rendering the will ineligible for probate"], relief_sought: "An order denying probate of the contested will for want of due execution", strength: moderate}
    - {count: 4, claim: "Fraud or mistake in the will's execution", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "18-C M.R.S. § 3-407; common law", elements: ["A material misrepresentation to or mistake by the testator about the instrument", "On which the testator relied in executing the will", "That caused the will to differ from the testator's true intent", "Rendering the will invalid"], relief_sought: "An order denying probate of the contested will procured by fraud or mistake", strength: weak}
    - {count: 5, claim: "Admission of the prior will and adjudication of testacy", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "18-C M.R.S. § 2-507; 18-C M.R.S. § 3-401 et seq.", elements: ["The decedent executed a valid prior will", "That was never revoked under 18-C M.R.S. § 2-507", "And remains the decedent's effective testamentary instrument", "Entitling it to formal probate if the contested will is denied"], relief_sought: "An order admitting the prior will to formal probate, or, if none controls, directing intestate distribution", strength: moderate}
  affirmative_defenses:
    n: {min: 2, max: 4}
    pick_n:
      - {defense: "The testator had capacity and acted freely", by: "{defendant_full_name}", basis: "The testator possessed testamentary capacity and executed the will of the testator's own free will. 18-C M.R.S. § 2-501."}
      - {defense: "The will is self-proved and validly executed", by: "{defendant_full_name}", basis: "The will was duly executed and is self-proved, establishing its validity. 18-C M.R.S. § 2-502; 18-C M.R.S. § 2-504."}
      - {defense: "The contest is barred by limitations", by: "{defendant_full_name}", basis: "The contest was not commenced within the period allowed to challenge a formal testacy order."}
      - {defense: "No confidential relationship or undue influence", by: "{defendant_full_name}", basis: "No confidential relationship or suspicious circumstances existed, and the will reflects the testator's free intent."}
  counterclaims:
    - {count: 1, claim: "Petition to admit the contested will to formal probate", by: "{defendant_full_name}", against: "{plaintiff_full_name}", relief: "Formal probate of the will dated {contested_will_date} and appointment of the proponent as personal representative."}
  discovery:
    n: {min: 3, max: 5}
    pick_n:
      - {type: interrogatories, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Interrogatories on the circumstances of the will's preparation, execution, and the beneficiary's role."}
      - {type: request_for_production, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Requests for the drafting file and signed medical authorizations for the decedent's records."}
      - {type: deposition, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-06-05", "2025-07-15"]}, status: outstanding, description: "Depositions of the proponent, the drafting attorney, the attesting witnesses, and the treating physician."}
      - {type: independent_examination, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-06-05", "2025-07-15"]}, status: served, description: "Expert review of the decedent's capacity records around the time of signing."}
      - {type: subpoena, propounding_party: "{plaintiff_full_name}", responding_party: "the estate's bank", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Subpoena to the bank for the decedent's account and estate records."}
  motions:
    n: {min: 2, max: 4}
    pick_n:
      - {title: "Motion for formal testacy and to supervise administration", type: procedural, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-04-15", "2025-05-15"]}, status: filed, relief: "An order adjudicating testacy in a formal proceeding and supervising the administration of the estate."}
      - {title: "Motion for partial summary judgment on due execution", type: dispositive, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-09-01", "2025-10-15"]}, status: under_advisement, relief: "A ruling that the contested will was not duly executed under 18-C M.R.S. § 2-502."}
      - {title: "Motion to compel the decedent's medical records", type: discovery, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-06-15", "2025-07-15"]}, status: granted, relief: "An order compelling production of the decedent's medical and cognitive records."}
      - {title: "Motion to appoint a temporary special administrator", type: provisional, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-04-15", "2025-05-15"]}, status: granted, relief: "Appointment of a special administrator to protect the estate pending resolution of the contest."}
  docket:
    - {date: {date_between: ["2025-04-05", "2025-04-25"]}, entry: "Petition for formal testacy and to contest the will filed.", party: "{plaintiff_full_name}"}
    - {date: {date_between: ["2025-05-10", "2025-05-30"]}, entry: "Proponent's response and petition to admit the contested will filed.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2025-06-05", "2025-06-25"]}, entry: "Order appointing a temporary special administrator entered.", party: "the court"}
    - {date: {date_between: ["2025-07-05", "2025-07-25"]}, entry: "Order compelling the decedent's medical records entered.", party: "the court"}
    - {date: {date_between: ["2025-09-05", "2025-09-25"]}, entry: "Capacity expert's report served; discovery continues.", party: "{plaintiff_full_name}"}
    - {date: {date_between: ["2025-11-05", "2025-11-25"]}, entry: "Hearing held on the motion regarding due execution.", party: "the court"}
  trial:
    jury: {pick: [true, false]}
    estimated_days: {int_between: [3, 8]}
    scheduled_date: {date_between: ["2026-08-01", "2027-04-01"]}
