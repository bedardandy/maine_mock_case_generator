id: criminal-oui
title: "State of Maine v. {defendant_full_name}"
practice_area: criminal
case_type: criminal
status: active
docket_prefix: CR

downstream:
  repo: maine-court-forms
  example_forms: [CR-001, CR-030]

jurisdiction:
  state: ME
  county: random
  court_type: District Court (Unified Criminal Docket)

dates:
  filing_date: {date_between: ["2025-09-01", "2026-04-01"]}
  event_date: "{arrest_date}"

# A Maine OUI (operating under the influence) misdemeanor prosecution. The client is the
# DEFENDANT, represented by defense counsel; the State of Maine prosecutes. This is the
# only criminal scenario, modeled cleanly and non-graphically: a routine roadside stop,
# a chemical test, and the usual suppression / license-consequence fights.
parties:
  client_role: defendant
  attorney: true
  roles:
    - {key: plaintiff, entity: organization, name: "State of Maine", label: "The State (prosecution)"}
    - {key: defendant, label: "Defendant (the accused, the client)"}

facts:
  arrest_date: {date_between: ["2025-08-15", "2026-03-15"]}
  charge: {pick: ["Operating Under the Influence (Class D)", "OUI with one prior (Class D)", "Aggravated OUI"]}
  bac_result: {pick: ["0.09", "0.11", "0.14", "refused"]}
  prior_ouis: {int_between: [0, 1]}
  chemical_test: {pick: ["breath test", "blood test", "refused testing"]}
  stop_reason: {pick: ["a traffic violation", "a sobriety checkpoint", "a reported erratic driver", "an equipment violation"]}
  field_sobriety_administered: {pick: [true, false]}
  accident_involved: {pick: [false, false, true]}
  license_suspended: {pick: [true, false]}
  plea: {pick: ["not guilty", "not guilty (pretrial)"]}

third_parties:
  count: {min: 2, max: 4}
  pool:
    - {type: witness, name_kind: person, role: "Arresting officer", relevance: "Made the traffic stop, conducted the OUI investigation, and authored the police report."}
    - {type: expert, name_kind: person, role: "State's breath-test operator", relevance: "Certified operator who administered the evidentiary breath test."}
    - {type: government_agency, name: "Maine Bureau of Motor Vehicles", role: "Secretary of State / BMV", relevance: "Administers the parallel administrative license suspension under the implied-consent law."}
    - {type: expert, name_kind: person, role: "Independent toxicologist", relevance: "May testify to breath-alcohol margin of error and absorption (rising-BAC) science."}
    - {type: witness, name_kind: person, role: "Passenger witness", relevance: "Rode with the defendant and can describe the driving and the stop."}

fact_pattern:
  summary: "The State of Maine charges {defendant_full_name} with {charge_lower} in {county} County following a roadside stop for {stop_reason} on {arrest_date}. The defense, through counsel, scrutinizes the basis for the stop and the foundation for the chemical test while protecting the client's license."
  narrative:
    - "On {arrest_date}, an officer stopped {defendant_full_name} in {county} County, Maine, citing {stop_reason}. After roadside contact, the officer initiated an operating-under-the-influence investigation, and the State now charges {defendant_first} with {charge_lower}."
    - "The investigation involved a {chemical_test}; the reported result was {bac_result}. The defense questions whether the stop was supported by reasonable suspicion, whether there was probable cause to arrest, and whether the chemical test result rests on an adequate evidentiary foundation."
    - "{defendant_first} entered a plea of {plea} and is contesting the case at the pretrial stage. Counsel is evaluating motions to suppress, the admissibility of the breath result, and the separate administrative license consequence handled by the Maine Bureau of Motor Vehicles, distinct from the criminal penalties."
  undisputed:
    - "An officer stopped {defendant_full_name} on {arrest_date} in {county} County, Maine."
    - "The encounter was investigated as an operating-under-the-influence matter and resulted in a {chemical_test}."
    - "{defendant_first} entered a plea of {plea}."
  disputed:
    - "Whether the officer had reasonable suspicion for the stop and probable cause to arrest."
    - "Whether the chemical test result is admissible and adequately founded (calibration, operator certification, and procedure)."
    - "Whether the State can prove every element of {charge_lower} beyond a reasonable doubt."
  timeline:
    - {date: "{arrest_date}", event: "Traffic stop and OUI investigation of {defendant_first} in {county} County."}
    - {date: "{filing_date}", event: "Charging instrument filed in {court_location} (Unified Criminal Docket)."}

interview:
  interviewer: "Defense Attorney"
  interviewee_role: defendant
  exchanges:
    - {topic: "The stop", question: "Why did the officer say they pulled you over?", answer: "They told me it was {stop_reason}. I did not think I was doing anything that would draw attention."}
    - {topic: "The testing", question: "What testing happened, and did you agree to it?", answer: "There was a {chemical_test}, and they read me something about implied consent. I was nervous and not sure what my options were."}
    - {topic: "Goal", question: "What matters most to you in how this comes out?", answer: "Keeping my license if I possibly can, avoiding a conviction, and keeping the fines and costs manageable. I rely on driving for work."}
    - {topic: "License", question: "Have you heard anything from the Bureau of Motor Vehicles?", answer: "Something about a separate suspension. I did not realize the license piece was its own process apart from court."}
    - {topic: "Plea", question: "How do you want to proceed for now?", answer: "I want to plead {plea} and have you look hard at whether the stop and the test were done right before I decide anything."}

objectives:
  goals:
    - "Suppress evidence obtained from an unlawful stop or an unfounded chemical test."
    - "Avoid a criminal OUI conviction, or minimize it to the least serious resolution."
    - "Protect the client's driving privileges in both the criminal and administrative tracks."
  priorities:
    - "Test the validity of the stop and the arrest."
    - "Challenge the foundation and admissibility of the chemical test."
    - "Mitigate fines, fees, and license consequences."
  risk_tolerance: {pick: [low, moderate]}
  desired_outcomes:
    - "Dismissal, acquittal, or a reduced, non-conviction disposition."
    - "Preservation of the client's license or the shortest possible suspension."
  non_starters:
    - "A plea that carries a longer license loss than the State can actually prove warranted."
  constraints:
    budget: {pick: ["Modest; prefers focused motion practice over a prolonged trial.", "Limited; cost-conscious but willing to litigate suppression issues."]}
    timeline: "Wants the suppression issues resolved before any dispositional decision."

issues:
  count: {min: 3, max: 5}
  pool:
    - {issue: "Whether the stop was supported by reasonable suspicion and the arrest by probable cause", category: criminal_procedure, governing_law: "U.S. Const. amend. IV; 29-A M.R.S. § 2411", sub_questions: ["Was the basis for the stop articulable and lawful?", "Did the officer develop probable cause before the arrest?"], strength: moderate, client_position: "Contends the stop and arrest lacked adequate justification and that resulting evidence should be suppressed."}
    - {issue: "Admissibility and evidentiary foundation of the chemical test", category: evidence, governing_law: "29-A M.R.S. § 2521", sub_questions: ["Was the instrument properly calibrated and the operator certified?", "Were the implied-consent procedures followed?"], strength: moderate, client_position: "Contends the chemical test result lacks adequate foundation and should be excluded."}
    - {issue: "Administrative license suspension versus the criminal license consequence", category: administrative, governing_law: "29-A M.R.S. § 2453", sub_questions: ["What suspension does the Bureau of Motor Vehicles impose, and on what timeline?", "How does the administrative action interact with any criminal sentence?"], strength: weak, client_position: "Seeks to limit license loss and coordinate the administrative and criminal tracks."}
    - {issue: "Right to an independent chemical test", category: criminal_procedure, governing_law: "29-A M.R.S. § 2521(3)", sub_questions: ["Was the defendant afforded a reasonable opportunity for an independent test?"], strength: weak, client_position: "Asserts that any denial of an independent test undercuts the State's evidence."}
    - {issue: "Whether the State can prove each element of the OUI charge", category: criminal, governing_law: "29-A M.R.S. § 2411", sub_questions: ["Can the State prove operation and impairment or a prohibited alcohol level?"], strength: moderate, client_position: "Holds the State to its burden of proof beyond a reasonable doubt."}

experts:
  count: {min: 0, max: 2}
  pool:
    - {field: "Forensic toxicology", credentials: "Ph.D.", retained_by: defendant, topic: "Breath-alcohol margin of error and rising-BAC extrapolation", opinion: "The reported result, within the instrument's margin of error and absorption timing, may not reflect the alcohol level at the time of operation.", basis: "Instrument specifications, calibration records, and pharmacokinetic modeling."}
    - {field: "Field sobriety testing", credentials: "Certified instructor", retained_by: defendant, topic: "Administration and scoring of standardized field sobriety tests", opinion: "Deviations from standardized procedure can undermine the reliability of the field sobriety indicators.", basis: "NHTSA standards and the officer's report and video."}

evidence:
  count: {min: 4, max: 7}
  pool:
    - {title: "Police OUI report", type: public_record, party: plaintiff, description: "The arresting officer's narrative report of the stop, investigation, and arrest."}
    - {title: "Cruiser and body-camera video", type: document, party: plaintiff, description: "Recorded footage of the stop, roadside encounter, and testing."}
    - {title: "Breath-test instrument logs and calibration records", type: document, party: plaintiff, description: "Maintenance, calibration, and certification records for the testing instrument."}
    - {title: "Chemical test result", type: medical_record, party: plaintiff, description: "The reported breath or blood alcohol result at the center of the case."}
    - {title: "Field sobriety test notes", type: document, party: plaintiff, description: "Officer's notes and scoring of any standardized field sobriety tests."}
    - {title: "Dispatch and 911 audio", type: correspondence, party: plaintiff, description: "Dispatch traffic and any citizen report underlying the stop."}
    - {title: "Implied-consent form", type: public_record, party: plaintiff, description: "The implied-consent advisory and the defendant's recorded response."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 1, max: 3}
  amounts:
    - {label: "Anticipated fines and court fees", amount: {int_between: [500, 2100]}, basis: "Statutory fine range and court costs for a misdemeanor OUI."}
    - {label: "Ignition interlock device cost", amount: {int_between: [70, 1500]}, basis: "Installation and monthly monitoring for the required period."}
    - {label: "Estimated lost income from license suspension", amount: {int_between: [400, 4000]}, basis: "Reduced work availability during any suspension."}

litigation:
  posture: pretrial
  causes_of_action:
    - {count: 1, claim: "Operating Under the Influence", by: "State of Maine", against: "{defendant_full_name}", governing_law: "29-A M.R.S. § 2411", elements: ["Operating a motor vehicle", "On a public way", "While under the influence of intoxicants or with a prohibited alcohol level", "In this State"], relief_sought: "Conviction; fine and license suspension", strength: moderate}
    - {count: 2, claim: "Failure to submit to a chemical test (implied consent)", by: "State of Maine", against: "{defendant_full_name}", governing_law: "29-A M.R.S. § 2521", elements: ["Lawful request for a chemical test", "Adequate implied-consent advisory", "Failure or refusal to submit"], relief_sought: "Enhanced penalties and administrative suspension", strength: weak}
  affirmative_defenses:
    n: {min: 2, max: 4}
    pick_n:
      - {defense: "Unlawful stop", by: "{defendant_full_name}", basis: "The stop lacked reasonable suspicion. U.S. Const. amend. IV."}
      - {defense: "Lack of probable cause to arrest", by: "{defendant_full_name}", basis: "The officer arrested without probable cause to believe the defendant was operating under the influence."}
      - {defense: "Improper test administration / foundation", by: "{defendant_full_name}", basis: "The chemical test was not administered or founded per 29-A M.R.S. § 2521 (calibration, certification, procedure)."}
      - {defense: "Rising-BAC defense", by: "{defendant_full_name}", basis: "Alcohol was still being absorbed, so the test overstates the alcohol level at the time of operation."}
      - {defense: "Denial of an independent test", by: "{defendant_full_name}", basis: "The defendant was not afforded a reasonable opportunity for an independent test. 29-A M.R.S. § 2521(3)."}
  motions:
    n: {min: 2, max: 4}
    pick_n:
      - {title: "Motion to suppress evidence from the stop", type: suppression, movant: "{defendant_full_name}", filed_date: {date_between: ["2025-10-15", "2025-11-30"]}, status: filed, relief: "Suppression of all evidence obtained after an unlawful stop."}
      - {title: "Motion to suppress the breath test", type: suppression, movant: "{defendant_full_name}", filed_date: {date_between: ["2025-11-01", "2025-12-15"]}, status: opposed, relief: "Exclusion of the chemical test result for lack of foundation."}
      - {title: "Motion in limine on field sobriety tests", type: evidentiary, movant: "{defendant_full_name}", filed_date: {date_between: ["2025-12-01", "2026-01-15"]}, status: filed, relief: "Limitation or exclusion of field sobriety test evidence."}
      - {title: "Motion to dismiss", type: dispositive, movant: "{defendant_full_name}", filed_date: {date_between: ["2025-10-15", "2025-11-30"]}, status: filed, relief: "Dismissal of the charge for insufficient basis."}
  discovery:
    n: {min: 2, max: 4}
    pick_n:
      - {type: request_for_production, propounding_party: "{defendant_full_name}", responding_party: "State of Maine", served_date: {date_between: ["2025-09-15", "2025-10-15"]}, status: served, description: "Request for the State's discovery under M.R.U.Crim.P. Rule 16 (reports, video, test records)."}
      - {type: subpoena, propounding_party: "{defendant_full_name}", responding_party: "Maine Bureau of Motor Vehicles", served_date: {date_between: ["2025-10-01", "2025-11-01"]}, status: served, description: "Subpoena for the breath-test instrument's calibration and certification records."}
      - {type: request_for_production, propounding_party: "{defendant_full_name}", responding_party: "State of Maine", served_date: {date_between: ["2025-10-15", "2025-11-15"]}, status: responded, description: "Document request for dispatch audio and the implied-consent form."}
      - {type: request_for_production, propounding_party: "{defendant_full_name}", responding_party: "State of Maine", served_date: {date_between: ["2025-11-01", "2025-12-01"]}, status: outstanding, description: "Supplemental document request for body-camera footage and operator logs."}
  docket:
    - {date: {date_between: ["2025-09-01", "2025-09-12"]}, entry: "Complaint and charging instrument filed.", party: "State of Maine"}
    - {date: {date_between: ["2025-09-15", "2025-09-26"]}, entry: "Initial appearance; bail and conditions of release set.", party: "the court"}
    - {date: {date_between: ["2025-09-29", "2025-10-10"]}, entry: "Arraignment; plea of not guilty entered.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2025-10-13", "2025-10-31"]}, entry: "Discovery served and exchanged under Rule 16.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2025-11-15", "2025-12-05"]}, entry: "Motion to suppress filed and set for hearing.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2026-01-10", "2026-01-31"]}, entry: "Dispositional conference held.", party: "the court"}
  trial:
    jury: {pick: [true, false]}
    estimated_days: {int_between: [1, 3]}
    scheduled_date: {date_between: ["2026-03-01", "2026-06-15"]}
