id: real-estate-transfer
title: "Sale of {property_address} from {transferor_full_name} to {transferee_full_name}"
practice_area: real_estate
case_type: real_estate_transfer
status: intake
docket_prefix: RE
assign_docket: false

downstream:
  repo: transactional-tax-forms
  example_forms: [ME-RETTD]

jurisdiction:
  state: ME
  county: random
  court_type: "Maine Registry of Deeds / Maine Revenue Services"

dates:
  filing_date: {date_between: ["2025-10-01", "2026-05-15"]}
  event_date: "{transfer_date}"

# A residential real-estate closing that drives the Maine Real Estate Transfer Tax
# Declaration (ME-RETTD), which uses a property / transferor / transferee namespace.
parties:
  client_role: transferee
  attorney: true
  roles:
    - {key: transferor, label: "Transferor (seller / grantor)"}
    - {key: transferee, label: "Transferee (buyer / grantee)"}

facts:
  property_address: {pick: ["14 Lighthouse Drive", "203 Granite Ridge Road", "8 Harbor Road", "57 Meadowbrook Drive", "129 Old Mill Road"]}
  property_town: {pick: ["Portland", "Brunswick", "Camden", "Bar Harbor", "Falmouth", "Yarmouth"]}
  property_county: "{county}"
  property_map_block_lot: {pick: ["Map 12, Block 3, Lot 7", "Map 4, Block 1, Lot 22", "Map 31, Block 9, Lot 5"]}
  purchase_price: {int_between: [185000, 1250000]}
  transfer_date: {date_between: ["2026-01-05", "2026-05-10"]}
  property_type: {pick: ["single-family residential", "residential condominium", "two-unit residential", "vacant residential land"]}
  adjusted_assessed_value: {int_between: [150000, 1100000]}
  special_circumstances_explanation: {pick: ["None", "Partial-interest transfer between family members", "Transfer includes seller-financing", "Short sale approved by lender"]}
  financing: {pick: ["conventional mortgage", "cash", "seller financing", "FHA mortgage"]}
  transfer_tax_exemption: {pick: [false, false, true]}
  # Closing facts: where the recorded deed is returned after recording, and the
  # earnest-money deposit held under the purchase-and-sale agreement.
  record_return_to: {pick: ["Coastal Title & Closing, LLC, 88 Commercial Street, Suite 200, Portland, ME 04101", "Harbor Law Group, P.A., 145 Maine Street, Brunswick, ME 04011", "the Grantee at the property address"]}
  earnest_money: {int_between: [2500, 45000]}
  # Source of title: the prior recorded deed by which the property came to the grantor
  # (or, for a fiduciary, into the trust or to the decedent). Every Maine deed recites
  # this "being the same premises" chain by book/page in the county registry (33 M.R.S.
  # § 201). Shared across all deed variants so the source-of-title block can render.
  has_source_of_title: true
  source_grantor: {pick: ["Estate of Walter B. Harmon", "Eleanor T. Pomroy", "Estate of Frances M. Doyle", "the Penobscot Land Company", "Albert R. and Mary J. Stearns", "Estate of George W. Tarbox"]}
  source_deed_date: {date_between: ["1988-01-01", "2016-12-31"]}
  registry: "{county} County"
  source_book: {int_between: [900, 8900]}
  source_page: {int_between: [1, 740]}

# The deed the parties choose fixes the covenant the instrument gives, and the
# grantor's CAPACITY fixes both the deed type and the authority recital. Rolling
# these independently let the warranty/quitclaim labels and the capacity disagree
# (the recurring covenant_type / grantor_capacity splits). Bundle them. A warranty
# deed (33 M.R.S. § 763) gives full covenants; a quitclaim deed with covenant
# (33 M.R.S. § 765) covenants only against the grantor's own acts; a fiduciary
# conveys WITHOUT personal warranty and must recite the source of authority.
# covenant_type and grantor_capacity are the ground-truth discriminator values.
variants:
  - weight: 4
    deed_type: "warranty deed"
    covenant_type: warranty
    grantor_capacity: individual
  - weight: 4
    deed_type: "quitclaim deed with covenant"
    covenant_type: quitclaim_covenant
    grantor_capacity: individual
  # EDGE CASE (plausible, uncommon): the seller is selling in a FIDUCIARY
  # capacity. Decision point: a personal representative / trustee does not give
  # personal covenants of warranty — they convey by a representative's deed with a
  # release/limited covenant and MUST recite the source of authority (Letters of
  # Authority and any license to sell, 18-C M.R.S. § 3-715; or the trust's power
  # of sale, 18-B M.R.S. § 816). Using a warranty deed here would over-promise.
  - weight: 1
    deed_type: "personal representative's deed"
    covenant_type: release
    grantor_capacity: personal_representative
    grantor_authority: "as duly appointed Personal Representative under Letters of Authority issued by the Probate Court, exercising the power of sale"
    # A PR conveys estate real estate by a representative's deed (no personal warranty)
    # and must name the decedent, the probate county + docket, and recite the Letters of
    # Authority + power of sale (18-C M.R.S. § 3-715(6),(23) PR powers incl. sale; § 3-711
    # powers over title). pr_name = the transferor acting as PR; decedent + docket identify
    # the estate. pr_deed_type=sale because this is a sale to a third-party buyer.
    pr_name: "{transferor_full_name}"
    fiduciary_name: "{transferor_full_name}"
    fiduciary_capacity: "Personal Representative"
    pr_deed_type: sale
    testacy: {pick: [testate, intestate]}
    decedent_name: {pick: ["Harold T. Whitcomb", "Eleanor M. Prescott", "Walter J. Bissett", "Doris A. Hallowell", "Raymond P. Lessard", "Gertrude E. Holloway"]}
    probate_county: "{county}"
    docket_number: {pick: ["2024-0417", "2023-1182", "2025-0683", "2024-0921", "2023-0559", "2025-0274"]}
  - weight: 1
    deed_type: "trustee's deed"
    covenant_type: release
    grantor_capacity: trustee
    grantor_authority: "as Trustee under the trust instrument, exercising the trustee's power of sale under 18-B M.R.S. § 816"
    # The trustee deed names the specific trust and its instrument date; the trustee
    # IS the transferor/grantor, conveying in a fiduciary capacity (no personal
    # warranty). Without these a trustee's deed (33 M.R.S. § 775 Form 3) cannot recite
    # its authority. trust_date predates the sale (the trust held the property first).
    trust_name: "the {transferor_full_name} Revocable Living Trust"
    trust_instrument: "Declaration of Trust"
    trust_date: {date_between: ["1998-01-01", "2020-12-31"]}
    trustee_name: "{transferor_full_name}"
    fiduciary_name: "{transferor_full_name}"
    fiduciary_capacity: "Trustee"

# ---------------------------------------------------------------------------
# LEGAL-ISSUE TIERING — confounding SECONDARY issues layered on the deed/covenant
# bundle above. Gated to grantor_capacity=individual so they stay coherent with a
# person-to-person transfer (the fiduciary PR/trustee variants keep their own
# posture). Most matters draw ZERO. Each injects coherent ground-truth facts + a
# spotted issue, carrying its Maine grounding + a confidence flag. Sources verified
# against legislature.maine.gov; AI-assembled research, NOT legal advice (see
# DISCLAIMER.md). Overbroad-application risk stated inline so the oracle is the
# CORRECT Maine rule — notably the spousal-joinder TRAP (Maine requires NO
# non-titled-spouse joinder on an inter-vivos deed; dower/curtesy are abolished).
confounders:
  count: {weights: [58, 27, 12, 3]}   # ~58% of matters stay clean
  pool:
    - id: improvident-transfer-elder-gift
      weight: 2
      requires: {grantor_capacity: individual}
      confidence: "HIGH / well-settled statute. Presumption applies ONLY when grantor is 60+ AND dependent AND in a confidential/fiduciary relationship AND consideration is less than full."
      source: "33 M.R.S. ch. 20, §§ 1021-1025 (Improvident Transfers of Title Act); RETT family exemption 36 M.R.S. § 4641-C(4)"
      facts:
        purchase_price: {pick: [1, 1, 5000, 10000]}
        fair_market_value: {int_between: [280000, 950000]}
        financing: "nominal consideration ('$1 and love and affection') — effectively a gift"
        grantor_age: {int_between: [78, 92]}
        grantor_dependent_status: {pick: [partially_dependent, wholly_dependent]}
        relationship_to_transferee: {pick: ["the grantor's paid caregiver", "the youngest child who moved in", "a late-life companion"]}
        confidential_or_fiduciary_relationship: true
        grantor_independent_counsel: false
        less_than_full_consideration: true
      issue:
        issue: "Improvident transfer — presumed undue influence on an elder's below-value conveyance (and the off-record nature of the risk)"
        category: real_estate
        governing_law: "33 M.R.S. §§ 1021-1025"
        sub_questions:
          - "Is the grantor 60+ and dependent, conveying for less than full consideration to a confidential/fiduciary relation without independent counsel? If so, undue influence is PRESUMED (§ 1022)."
          - "Because § 1025 forbids any recital/recording of compliance, the risk is OFF-RECORD — title exam will not catch it; the cure is independent counsel for the grantor, a process fact, not a deed choice."
        strength: moderate
    - id: grantor-capacity-at-execution
      weight: 2
      requires: {grantor_capacity: individual}
      confidence: "void/voidable rule well-settled (Hovey v. Hobson, 53 Me. 451 (1866)); a modern pinpoint is UNVERIFIED. Capacity is transaction-specific and PRESUMED."
      source: "Common law — deed by a person of unsound mind is voidable, not void (Hovey v. Hobson, 53 Me. 451 (1866)); adjudicated-incapacity conveyances run through a conservator/guardian"
      facts:
        grantor_capacity_in_fact: {pick: [diminished_alleged, capacity_disputed]}
        diagnosis_or_event_at_execution: {pick: [early_dementia, post_stroke, none_documented]}
        conservator_or_guardian_appointed: false
      issue:
        issue: "Grantor's mental capacity to convey at the moment of execution"
        category: real_estate
        governing_law: "Common law; Hovey v. Hobson, 53 Me. 451 (1866)"
        sub_questions:
          - "Did the grantor understand the nature and effect of the conveyance when signing? (Capacity is presumed; mere age or a diagnosis is not incapacity.)"
          - "If a conservator/guardian has been appointed, confirm the fiduciary's authority and any required probate-court approval — the proper signer depends on the order and statute, not on the diagnosis alone."
        strength: moderate
    - id: spousal-no-joinder-trap
      weight: 3
      requires: {grantor_capacity: individual}
      confidence: "HIGH on dower/curtesy abolition + elective share; the 'no joinder required' generalization is fact-specific to vesting. OVERBROAD-IMPORT TRAP — do NOT require spousal joinder on a Maine inter-vivos deed of solely-owned property."
      source: "18-C M.R.S. § 2-111 (dower/curtesy abolished); § 2-202 (elective share); § 2-207 (augmented estate); 33 M.R.S. § 772-A (effect of release). Maine does NOT recognize tenancy by the entirety."
      facts:
        grantor_marital_status: married
        title_vesting: sole_grantor
        non_titled_spouse_joinder_required: false
        non_titled_spouse_joined: false
        elective_share_pullback_risk: true
      issue:
        issue: "Spousal joinder is NOT required on this inter-vivos deed (the over-import trap) — the real exposure is the elective share at death"
        category: real_estate
        governing_law: "18-C M.R.S. § 2-111; § 2-202; § 2-207"
        sub_questions:
          - "Because dower/curtesy are abolished, a non-titled spouse need NOT join a deed of property the other spouse owns solely — a template that forces a joinder/release line here is WRONG for Maine."
          - "The uncompensated lifetime transfer can instead be pulled into the augmented estate for the surviving spouse's elective share — a future claim, not a present joinder defect."
        strength: moderate
    - id: co-owner-joinder-required
      weight: 2
      requires: {grantor_capacity: individual}
      confidence: "HIGH / well-settled. Contrast with the spousal trap: a co-owner OF RECORD must join."
      source: "33 M.R.S. ch. 7 (estates passing, § 151); ch. 12 (Short Form Deeds Act). A conveyance binds only the interests of those who sign."
      facts:
        record_co_owners: "the grantor and a co-owner of record"
        co_tenancy_type: {pick: [joint_tenancy, tenancy_in_common]}
        only_one_co_owner_signs: true
        severance_or_partial_conveyance_risk: true
      issue:
        issue: "Co-owner joinder — a deed conveys only the signing co-owner's undivided interest; conveying one joint tenant's interest may sever it into a tenancy in common"
        category: real_estate
        governing_law: "33 M.R.S. § 151; ch. 12 (Short Form Deeds Act)"
        sub_questions:
          - "Are ALL record co-owners named as grantors? A deed signed by only one validly conveys only that co-owner's undivided interest, not the whole."
          - "If the interest was held in joint tenancy, conveying one tenant's share may sever it into a tenancy in common (an effect of the conveyance, not a defect in the deed)."
        strength: moderate
    - id: mainecare-estate-recovery-lookback
      weight: 1
      requires: {grantor_capacity: individual}
      confidence: "HIGH on each framework; but the transfer PENALTY (federal look-back) and estate RECOVERY (state, at death) are DISTINCT — do not conflate. Not every gift triggers a penalty (exempt-transfer categories exist)."
      source: "42 U.S.C. § 1396p(c) (5-year transfer look-back/penalty); 22 M.R.S. § 14 (MaineCare estate recovery, age 55+)"
      facts:
        grantor_age_55_plus: true
        long_term_care_application_likely: true
        transfer_uncompensated: true
        grantor_retained_interest: {pick: [none, life_estate]}
      issue:
        issue: "MaineCare exposure from a below-FMV conveyance — DISTINCT transfer-penalty and estate-recovery issues (do not conflate)"
        category: real_estate
        governing_law: "42 U.S.C. § 1396p(c) (transfer penalty); 22 M.R.S. § 14 (estate recovery)"
        sub_questions:
          - "Transfer penalty: could an uncompensated transfer within 5 years of a long-term-care application create an ineligibility penalty, subject to the exempt-transfer categories?"
          - "Estate recovery: are there interests retained at death that 22 M.R.S. § 14 could reach? This is a SEPARATE question from the transfer penalty."
          - "Planning options are fact-specific and may THEMSELVES create penalty or recovery consequences (e.g., a retained life estate has its own valuation/recovery effects) — do not assume a life-estate deed or trust is the 'right instrument'."
        strength: moderate
    - id: fraudulent-transfer-creditor
      weight: 2
      requires: {grantor_capacity: individual}
      confidence: "HIGH (statute verified). Actual-intent (§ 3575) turns on badges of fraud and needs neither insolvency nor lack of value; constructive claims generally require lack of reasonably-equivalent value PLUS insolvency / unreasonably small assets / inability to pay — solvent arm's-length sales are not fraudulent transfers."
      source: "14 M.R.S. ch. 504, §§ 3571-3582 (Maine Uniform FRAUDULENT Transfer Act — NOT recodified as UVTA); § 3575 (actual intent/badges), § 3576 (constructive)"
      facts:
        grantor_solvency: {pick: [insolvent, rendered_insolvent_by_transfer]}
        transferee_is_insider: true
        reasonably_equivalent_value_received: false
        pending_or_threatened_creditor_claim: true
      issue:
        issue: "Fraudulent transfer — conveyance voidable by creditors (a facially valid deed that is reversible)"
        category: real_estate
        governing_law: "14 M.R.S. §§ 3575, 3576 (UFTA)"
        sub_questions:
          - "Do badges of fraud (insider transferee, near-insolvency, lack of reasonably-equivalent value, looming creditor) make the conveyance voidable?"
          - "Is the recited consideration honest, and is it safe to record the deed at all while the claim is pending?"
        strength: moderate
    - id: rett-exemption-posture
      weight: 2
      confidence: "HIGH (statute + MRS Bulletin 31). Exemptions are narrow and predicate-specific — 'no money changed hands' is NOT a blanket exemption."
      source: "36 M.R.S. § 4641-A (rate/liability); § 4641-C (exemptions, e.g. (3) corrective, (4) spouse/parent-child, (18) LLC proportional, (20) controlling-interest); § 4641-D (declaration of value)"
      facts:
        relationship: {pick: [spouse, parent_child, grandparent_grandchild, unrelated]}
        transfer_purpose: {pick: [gift, sale, corrective, deed_in_lieu]}
        claimed_exemption_subsection: {pick: ["4641-C(3)", "4641-C(4)", "none"]}
      issue:
        issue: "Real Estate Transfer Tax — which exemption (if any) the declaration may claim"
        category: tax
        governing_law: "36 M.R.S. §§ 4641-A, 4641-C, 4641-D"
        sub_questions:
          - "Does a relationship- or structure-specific exemption actually apply, or is the transfer taxable on the consideration / debt forgiven?"
          - "A '$1 / love and affection' deed between UNRELATED parties is not exempt; a deed-in-lieu is generally taxable on the debt — does the claimed box fit?"
        strength: moderate

third_parties:
  count: {min: 2, max: 4}
  pool:
    - {type: business_entity, name_kind: organization, role: "Title insurance company", relevance: "Issues the owner's and lender's title policies at closing."}
    - {type: financial_institution, name_kind: bank, role: "Mortgage lender", relevance: "Finances the buyer's purchase and records a mortgage."}
    - {type: business_entity, name_kind: organization, role: "Real estate brokerage", relevance: "Represented the parties in the transaction."}
    - {type: government_agency, name: "Maine Revenue Services", role: "Transfer tax authority", relevance: "Collects the real estate transfer tax via the RETTD."}
    - {type: government_agency, name: "County Registry of Deeds", role: "Recording office", relevance: "Records the deed and the transfer tax declaration."}

fact_pattern:
  summary: "{transferee_full_name} is purchasing {property_type} at {property_address}, {property_town}, Maine from {transferor_full_name} for ${purchase_price}, requiring a Maine Real Estate Transfer Tax Declaration at recording."
  narrative:
    - "{transferor_full_name} has agreed to sell, and {transferee_full_name} to buy, the {property_type} property at {property_address} in {property_town}, {county} County, Maine. The agreed purchase price is ${purchase_price}, with closing set for about {transfer_date}."
    - "The buyer is financing the purchase through {financing}, and title will pass by {deed_type}. At recording in the {county} County Registry of Deeds, the parties must file a Real Estate Transfer Tax Declaration (RETTD) reporting the price, the property, and the transferor and transferee, and pay the Maine transfer tax unless an exemption applies."
    - "Counsel is handling the closing, confirming clear title, prorating taxes, and preparing the deed and the transfer tax declaration for the parties' signatures."
  undisputed:
    - "The property at {property_address}, {property_town} is being transferred from {transferor_full_name} to {transferee_full_name}."
    - "The stated purchase price is ${purchase_price}."
    - "The transfer must be reported on a Maine RETTD at recording."
  disputed:
    - "Whether a transfer tax exemption applies to this transaction."
    - "The allocation of prorated property taxes and closing costs between the parties."

interview:
  interviewer: "Closing Attorney"
  interviewee_role: transferee
  exchanges:
    - {topic: "Property", question: "What are you buying and for how much?", answer: "The {property_type} at {property_address} in {property_town}, for ${purchase_price}."}
    - {topic: "Financing", question: "How are you paying?", answer: "Through {financing}. We expect to close around {transfer_date}."}
    - {topic: "Title", question: "Any known title concerns?", answer: "Not that we know of; we are getting title insurance and a {deed_type}."}
    - {topic: "Taxes", question: "Do you understand the transfer tax?", answer: "We know there is a Maine transfer tax reported on the RETTD at recording, split between buyer and seller."}
    - {topic: "Goal", question: "What do you need from the closing?", answer: "Clear title, a clean RETTD, and the deed recorded correctly."}

objectives:
  goals:
    - "Close the purchase with clear, insurable title."
    - "File an accurate Real Estate Transfer Tax Declaration and pay the correct tax."
    - "Record the deed promptly in the county registry."
  priorities:
    - "Clear title and correct recording."
    - "Accurate transfer tax reporting."
  risk_tolerance: low
  desired_outcomes:
    - "A recorded deed and a properly filed RETTD."
  non_starters:
    - "Closing with an unresolved title defect."
  constraints:
    budget: "Standard closing costs; buyer and seller split the transfer tax."
    timeline: "Closing target around {transfer_date}."

issues:
  count: {min: 2, max: 4}
  pool:
    - {issue: "Calculation of the Maine real estate transfer tax", category: tax, governing_law: "36 M.R.S. § 4641-A", sub_questions: ["What is the consideration subject to tax?", "How is the tax split between transferor and transferee?"], strength: strong}
    - {issue: "Availability of a transfer tax exemption", category: tax, governing_law: "36 M.R.S. § 4641-C", sub_questions: ["Does any statutory exemption apply to this transfer?"], strength: moderate}
    - {issue: "Marketability and insurability of title", category: real_estate, governing_law: "33 M.R.S. § 351", sub_questions: ["Are there liens, easements, or encumbrances of record?"], strength: moderate}
    - {issue: "Proper recording of the deed and declaration", category: real_estate, governing_law: "33 M.R.S. § 651", sub_questions: ["Is the deed in recordable form with the RETTD attached?"], strength: strong}

evidence:
  count: {min: 3, max: 5}
  pool:
    - {title: "Purchase and sale agreement", type: contract, party: transferee, description: "The executed agreement setting price and terms."}
    - {title: "Title commitment", type: document, party: transferee, description: "The title company's commitment and exceptions."}
    - {title: "Proposed deed", type: document, party: transferor, description: "The deed prepared for the conveyance."}
    - {title: "Settlement statement", type: financial_record, party: transferee, description: "Closing disclosure with prorations and the transfer tax."}
    - {title: "Property tax assessment", type: public_record, party: transferee, description: "The municipal assessment supporting adjusted assessed value."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 2, max: 4}
  amounts:
    - {label: "Purchase price", amount: {int_between: [185000, 1250000]}, basis: "Agreed consideration."}
    - {label: "Estimated Maine transfer tax", amount: {int_between: [800, 5500]}, basis: "$2.20 per $500 of value, split between the parties."}
    - {label: "Mortgage amount", amount: {int_between: [0, 1000000]}, basis: "Buyer's financing."}
    - {label: "Adjusted assessed value", amount: {int_between: [150000, 1100000]}, basis: "Municipal assessment."}
