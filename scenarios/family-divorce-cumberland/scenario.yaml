id: family-divorce-cumberland
title: "Divorce of {plaintiff_full_name} and {defendant_full_name}"
practice_area: family
case_type: family_matters
status: pre_filing
docket_prefix: FM

downstream:
  repo: maine-court-forms
  example_forms: [FM-040, FM-050, CV-001]

jurisdiction:
  state: ME
  county: Cumberland
  court_type: District Court

dates:
  filing_date: {date_between: ["2025-09-01", "2026-06-01"]}
  event_date: "{separation_date}"

parties:
  client_role: plaintiff
  attorney: true
  children: {min: 1, max: 3}
  roles:
    - {key: plaintiff, label: "Plaintiff (filing spouse)"}
    - {key: defendant, label: "Defendant (responding spouse)"}

facts:
  marriage_date: {date_between: ["2006-01-01", "2019-12-31"]}
  marriage_place: {pick: ["Portland, Maine", "Bangor, Maine", "Bar Harbor, Maine", "Camden, Maine", "Brunswick, Maine"]}
  marriage_city: {pick: ["Portland", "Brunswick", "Bar Harbor", "Camden", "Bath", "Bangor"]}
  marriage_county: {pick: ["Cumberland", "Sagadahoc", "Hancock", "Knox", "Penobscot"]}
  marriage_state: "Maine"
  separation_date: {date_between: ["2025-01-01", "2025-08-31"]}
  grounds: {pick: ["Irreconcilable differences", "Irreconcilable marital differences"]}
  residency_months: {int_between: [7, 60]}
  spousal_support_requested: {pick: [true, false]}
  marital_home: {pick: ["jointly owned single-family home", "jointly owned condominium", "rented apartment"]}
  num_minor_children: "{num_children}"
  primary_residence_parent: {pick: ["{plaintiff_full_name}", "{defendant_full_name}"]}
  # Financial-affidavit / child-support facts (feed FM-050 Child Support Affidavit, FM-043)
  employer_name: {pick: ["Northcoast Logistics LLC", "Acadia Print Works", "Pemaquid Software Co.", "Katahdin Outfitters Inc.", "Penobscot Maritime Supply"]}
  current_gross_pay: {int_between: [700, 2800]}
  hourly_wage: {int_between: [17, 62]}
  hours_worked: {int_between: [32, 45]}
  last_year_earnings: {int_between: [34000, 132000]}
  expected_year_earnings: {int_between: [36000, 138000]}
  bonuses_income: {int_between: [0, 12000]}
  commissions_tips_income: {int_between: [0, 8000]}
  fringe_benefits: {int_between: [0, 6000]}
  health_insurance_cost_self: {int_between: [40, 300]}
  health_insurance_cost_children: {int_between: [50, 420]}
  cash_bank_accounts_value: {int_between: [500, 26000]}
  credit_cards_balance: {int_between: [0, 18000]}
  mortgages_balance: {int_between: [0, 285000]}
  loans_balance: {int_between: [0, 30000]}
  other_assets_value: {int_between: [0, 42000]}

third_parties:
  count: {min: 1, max: 3}
  pool:
    - {type: guardian_ad_litem, role: "Guardian ad litem", name_kind: person, relevance: "May be appointed to represent the best interests of the minor children."}
    - {type: employer, name_kind: employer, role: "Plaintiff's employer", relevance: "Source of income and benefits relevant to support calculations."}
    - {type: financial_institution, name_kind: bank, role: "Joint account holder bank", relevance: "Holds the marital checking, savings, and mortgage accounts."}
    - {type: family_member, name_kind: person, role: "Plaintiff's mother", relationship: "Maternal grandmother", relevance: "Provides child care and may testify to parenting history."}
    - {type: healthcare_provider, name_kind: person, role: "Family counselor", relevance: "Saw the parties for marriage counseling before separation."}

fact_pattern:
  summary: "{plaintiff_full_name} petitions to divorce {defendant_full_name} in {county} County District Court, citing {grounds_lower}, and asks the court to resolve parental rights for {num_children_words} minor child(ren), child support, and division of marital property."
  narrative:
    - "{plaintiff_full_name} and {defendant_full_name} were married on {marriage_date} in {marriage_city}, {marriage_state}. The parties have {num_children_words} minor child(ren) together: {children_names}. After several years of growing conflict and a period of unsuccessful counseling, the parties separated on {separation_date}."
    - "Since separation, the children have lived primarily with {primary_residence_parent}, while the other parent has exercised weekend contact. The parties jointly own or rent a {marital_home} and share several financial accounts. They disagree about a long-term parenting schedule and about how to divide retirement savings accumulated during the marriage."
    - "{plaintiff_first} has resided in {county} County, Maine for approximately {residency_months} months, satisfying the residency requirement to file. {plaintiff_first} now seeks a divorce on the ground of {grounds_lower}, a workable parental rights and responsibilities order, child support consistent with the Maine guidelines, and an equitable division of marital property and debt."
  undisputed:
    - "The parties were married on {marriage_date} in {marriage_city}, {marriage_state}."
    - "The parties have {num_children_words} minor child(ren) of the marriage."
    - "The parties separated on {separation_date} and have lived apart since."
  disputed:
    - "The long-term allocation of parental rights and responsibilities and the primary residence of the children."
    - "The characterization and division of retirement accounts and the equity in the {marital_home}."
    - "Whether spousal support is appropriate and, if so, in what amount and for how long."
  timeline:
    - {date: "{marriage_date}", event: "{plaintiff_first} and {defendant_first} married in {marriage_city}, {marriage_state}."}
    - {date: "{separation_date}", event: "The parties separated."}
    - {date: "{filing_date}", event: "Complaint for divorce prepared for filing in {court_location} District Court."}

interview:
  interviewer: "Intake Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Goal", question: "What outcome are you hoping for?", answer: "I want a fair parenting schedule where our children are primarily with me, reasonable child support, and a clean split of what we built together. I am not trying to punish {defendant_first}."}
    - {topic: "Children", question: "How are the children doing, and what is the current schedule?", answer: "They are doing okay given everything. They are mostly with {primary_residence_parent} during the week and see the other parent on weekends. I want to keep their school and routine stable."}
    - {topic: "Finances", question: "Tell me about the marital finances.", answer: "We have a {marital_home}, two retirement accounts, a joint checking and savings, and some credit card debt. I do not have full visibility into {defendant_first}'s retirement balances."}
    - {topic: "Safety", question: "Are there any safety concerns or history of abuse?", answer: "No physical abuse. There were some heated arguments, but nothing that needed police involvement."}
    - {topic: "Timeline", question: "Is there any urgency to filing?", answer: "I would like to get this moving this season so we have orders in place before the next school year."}

objectives:
  goals:
    - "Obtain a parental rights and responsibilities order with the children's primary residence with {primary_residence_parent}."
    - "Establish child support consistent with the Maine child support guidelines."
    - "Achieve an equitable division of marital property and debt."
  priorities:
    - "Stability and routine for the minor children."
    - "A predictable, enforceable parenting schedule."
    - "Financial independence after the divorce."
  risk_tolerance: {pick: [low, moderate]}
  desired_outcomes:
    - "Primary residence of the children with {primary_residence_parent} and shared parental rights."
    - "Retention of a fair share of retirement savings and home equity."
  non_starters:
    - "Any arrangement that destabilizes the children's schooling."
  constraints:
    budget: {pick: ["Limited; prefers settlement over a prolonged trial.", "Moderate; willing to mediate but will litigate parenting if needed."]}
    timeline: "Wants temporary orders before the next school year."

issues:
  count: {min: 3, max: 5}
  pool:
    - {issue: "Allocation of parental rights and responsibilities for the minor children", category: family, governing_law: "19-A M.R.S. § 1653", sub_questions: ["Should parental rights be shared, allocated, or sole?", "What primary residence and contact schedule serves the children's best interests?"], strength: moderate, client_position: "Seeks shared parental rights with primary residence with {primary_residence_parent}."}
    - {issue: "Child support under the Maine guidelines", category: family, governing_law: "19-A M.R.S. § 2006", sub_questions: ["What are each party's gross incomes?", "Who pays for health insurance and child care?"], strength: strong, client_position: "Seeks guideline child support based on accurate income figures."}
    - {issue: "Division of marital property and debt", category: family, governing_law: "19-A M.R.S. § 953", sub_questions: ["Which assets are marital versus non-marital?", "How should retirement accounts and home equity be divided?"], strength: moderate}
    - {issue: "Entitlement to and amount of spousal support", category: family, governing_law: "19-A M.R.S. § 951-A", sub_questions: ["Is spousal support appropriate given the marriage length and incomes?"], strength: weak}
    - {issue: "Responsibility for attorney fees", category: family, governing_law: "19-A M.R.S. § 105", sub_questions: ["Is a fee contribution warranted by the parties' relative resources?"], strength: weak}

experts:
  count: {min: 0, max: 2}
  pool:
    - {field: "Child custody / parenting evaluation", credentials: "Ph.D.", retained_by: court, topic: "Best interests and parenting capacity", opinion: "Both parents are fit; a primary-residence-with-shared-contact schedule best serves the children's stability.", basis: "Clinical interviews, home visits, and collateral contacts."}
    - {field: "Forensic accounting", credentials: "CPA", retained_by: plaintiff, topic: "Tracing and valuation of marital accounts", opinion: "Retirement contributions during the marriage are marital and total a divisible balance.", basis: "Account statements and contribution histories."}
    - {field: "Vocational assessment", credentials: "MBA, CVA", retained_by: defendant, topic: "Earning capacity", opinion: "The lower-earning spouse can return to full-time work within a year.", basis: "Work history and labor-market data."}

evidence:
  count: {min: 3, max: 6}
  pool:
    - {title: "Marriage certificate", type: public_record, party: plaintiff, description: "Certified copy establishing the date and place of marriage."}
    - {title: "Plaintiff's financial statement (FM-050)", type: financial_record, party: plaintiff, description: "Court financial statement of income, expenses, assets, and debts."}
    - {title: "Recent pay stubs", type: financial_record, party: plaintiff, description: "Three months of pay stubs for income verification."}
    - {title: "Retirement account statements", type: financial_record, party: defendant, description: "Quarterly statements for both parties' retirement accounts."}
    - {title: "Deed to the marital home", type: public_record, party: plaintiff, description: "Recorded deed showing joint ownership."}
    - {title: "Children's school records", type: document, party: plaintiff, description: "Enrollment and report cards showing the children's stable schooling."}
    - {title: "Text message log", type: correspondence, party: plaintiff, description: "Co-parenting communications relevant to the schedule dispute."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 2, max: 4}
  amounts:
    - {label: "Estimated marital home equity", amount: {int_between: [60000, 340000]}, basis: "Estimated fair market value less mortgage."}
    - {label: "Plaintiff retirement account balance", amount: {int_between: [15000, 180000]}, basis: "Most recent statement."}
    - {label: "Defendant retirement account balance", amount: {int_between: [15000, 220000]}, basis: "Most recent statement."}
    - {label: "Joint credit card debt", amount: {int_between: [2000, 28000]}, basis: "Combined balances."}
    - {label: "Plaintiff annual gross income", amount: {int_between: [38000, 110000]}, basis: "W-2 wages."}

# Chronological case events handed off as bundles (see complex-civil-litigation
# for the field contract). A divorce that turns urgent mid-case when the other
# parent acts unilaterally — the incident the firm must answer with an emergency
# motion. day = days from filing_date.
procedure:
  - day: 0
    actor: us
    event: "Complaint for divorce filed with an interim relief request."
    produces: [family_law__divorce_complaint]
  - day: 21
    actor: opposing
    event: "Defendant served an Answer and a counterclaim seeking primary residence of the children."
    produces: [family_law__pleading]
    deadline_days: 20
    deadline_rule: "M.R. Civ. P. 80(c) — response to the counterclaim for divorce."
  - day: 38
    actor: client
    event: "Client reports the defendant removed the children from school, withdrew the joint savings, and will not disclose where the children are staying."
    produces: [family_law__motion]
    urgent: true
    deadline_days: 0
    deadline_rule: "19-A M.R.S. § 904 / M.R. Civ. P. 65 — emergency motion for interim parental rights and to freeze marital assets pending hearing."

# -------------------------------------------------------------------------
# LEGAL-ISSUE TIERING — confounding SECONDARY family-law issues layered on the
# primary divorce. Most matters draw ZERO (the weights keep a clean matter the
# common case); any one exotic issue is rare. Each confounder injects coherent
# ground-truth facts + a spotted issue + (where apt) an affirmative defense, and
# carries its Maine grounding + a confidence flag. Sources are AI-assembled
# research verified against legislature.maine.gov, NOT legal advice (see
# DISCLAIMER.md); each overbroad-application risk is stated inline so the oracle
# is the CORRECT Maine rule, not a naive over-claim.
confounders:
  count: {weights: [60, 26, 11, 3]} # ~60% of matters stay clean
  pool:
    # divorce residency / subject-matter jurisdiction (four alternative bases)
    - id: divorce-jurisdiction-and-personal-jurisdiction
      weight: 3
      confidence: "High — § 901's four alternative bases are well-settled; personal jurisdiction over a non-resident spouse is a separate, fact-specific question"
      source: "19-A M.R.S. § 901 (four alternative jurisdiction bases); 14 M.R.S. § 704-A (long-arm)"
      facts:
        petitioner_residency_basis_satisfied: true
        defendant_resides_out_of_state: true
        defendant_other_state: {pick: ["New Hampshire", "Massachusetts", "Florida"]}
        married_in_maine: true
        personal_jurisdiction_over_defendant_question: true
      issue:
        issue: "Divorce subject-matter jurisdiction under the four alternative § 901 bases, and personal jurisdiction over an out-of-state spouse"
        category: family
        governing_law: "19-A M.R.S. § 901; 14 M.R.S. § 704-A"
        sub_questions:
          - "Which of § 901's four ALTERNATIVE bases supplies jurisdiction — the plaintiff'§ 6-month residency is only one of them, so a complaint is not defeated merely because that track is doubtful?"
          - "Does Maine have personal jurisdiction over the non-resident spouse for in personam support/property relief, or only status jurisdiction to grant the divorce itself?"
        strength: moderate
        notes: "Overbroad-risk: do NOT hardcode the 6-month residency track as exclusive — bases (1)(B)-(D) (married in Maine, cause accrued here, or the defendant is a Maine resident) each suffice; § 901 resolves subject-matter jurisdiction only and does NOT establish personal jurisdiction over the defendant."
      defense:
        defense: "Lack of personal jurisdiction over the non-resident spouse for support and property orders"
        by: "{defendant_full_name}"
        basis: "Maine has divorce subject-matter jurisdiction under 19-A M.R.S. § 901, but in personam support/property relief requires Maine long-arm contacts under 14 M.R.S. § 704-A. NOTE (overbroad-risk): § 901's four bases are ALTERNATIVE and the status divorce can proceed on the plaintiff's residency even without personal jurisdiction over the defendant — absence of personal jurisdiction limits monetary/property relief, it does not defeat the divorce."
    # child-support guideline deviation (written-findings requirement)
    - id: child-support-guideline-deviation
      weight: 4
      confidence: "High (statute); Medium (factor weighting is case-specific)"
      source: "19-A M.R.S. § 2006 (income-shares guidelines + worksheet); § 2007 (deviation; written proposed findings; ~17 factors)"
      facts:
        deviation_proposed: true
        substantially_equal_parenting: {pick: [true, false]}
        deviation_factor: {pick: ["extraordinary transportation costs exceeding 15% of the yearly support obligation", "a substantially equal parenting arrangement", "the child's standard of living during the marriage"]}
        written_deviation_findings_required: true
      issue:
        issue: "Child-support guideline deviation and the mandatory written-findings requirement"
        category: family
        governing_law: "19-A M.R.S. § 2006; § 2007"
        sub_questions:
          - "Does the § 2006 worksheet apply directly, or does a substantially-equal-parenting analysis change the base calculation first?"
          - "If a deviation is sought, are the § 2007 written proposed findings prepared, or does the order silently adjust the number?"
        strength: moderate
        notes: "Overbroad-risk: a deviation requires an EXPLICIT written-findings block under § 2007 — silently adjusting the guideline number produces a defective order; the § 2006 substantially-equal-parenting analysis must precede the base table."
    # marital vs non-marital classification, tracing, active appreciation
    - id: marital-vs-nonmarital-classification
      weight: 4
      confidence: "High (framework); Medium (the active-role boundary is UNSETTLED at the margins)"
      source: "19-A M.R.S. § 953 (marital presumption + four § 953(2) exclusions); Doucette v. Washburn, 2001 ME 38 (tracing); Hedges v. Pitcher, 2008 ME 55 (routine reinvestment is not a substantial active role)"
      facts:
        nonmarital_claim_asset: {pick: ["an inheritance received during the marriage", "a home owned before the marriage", "a gift from a family member"]}
        property_source: {pick: ["inherited", "premarital", "gift"]}
        appreciation_during_marriage: true
        active_management_by_spouse: {pick: [true, false]}
        premarital_agreement_present: false
        tracing_required: true
      issue:
        issue: "Marital versus non-marital classification, tracing, and the active-appreciation rule"
        category: family
        governing_law: "19-A M.R.S. § 953; Doucette v. Washburn, 2001 ME 38; Hedges v. Pitcher, 2008 ME 55"
        sub_questions:
          - "Does the claimed asset trace to a § 953(2) exclusion (gift, bequest, exchange for separate property, post-separation acquisition, or a valid agreement)?"
          - "Did a spouse take a 'substantial active role' in managing or improving the asset, converting its appreciation to marital, or is the gain passive market appreciation that stays separate?"
        strength: moderate
        notes: "Overbroad-risk: § 953(1) presumes property acquired during the marriage MARITAL regardless of title — the claimant bears the tracing burden; appreciation of non-marital property stays non-marital ONLY absent a substantial active role; and Maine is EQUITABLE DISTRIBUTION (not community property), so a non-marital label sets the asset apart but does not wholly remove it from the equitable analysis."
      defense:
        defense: "The disputed asset is non-marital separate property"
        by: "{defendant_full_name}"
        basis: "The asset traces to a § 953(2) exclusion and is separate property. NOTE (overbroad-risk): the § 953(1) presumption makes property acquired during the marriage marital regardless of title; the party claiming an exclusion bears the burden of tracing, and a spouse's substantial active role in managing or improving the asset can transmute its appreciation into marital property (Hedges v. Pitcher, 2008 ME 55)."
    # retirement/pension division + QDRO sub-document (coverture UNVERIFIED)
    - id: pension-division-qdro-subdocument
      weight: 3
      confidence: "High that pension division OFTEN requires a separate plan-compliant order in ADDITION to judgment language — a federally compliant QDRO for a private ERISA plan, or a MainePERS/governmental-plan-compliant division order for a non-ERISA public plan; the required instrument depends on the plan type. UNVERIFIED / EXPERIMENTAL that the coverture-fraction marital-portion formula is explicit Maine STATUTORY text (it is derived from plan practice / the MainePERS model DRO, not a statute)"
      source: "19-A M.R.S. § 953 (division); 5 M.R.S. § 17059 (MainePERS division-order regime); a private ERISA plan requires a separate federally compliant QDRO, while a MainePERS or other governmental/church plan is not an ERISA QDRO plan and takes its own plan-compliant order; coverture fraction per MainePERS model DRO (NOT a statute)"
      facts:
        pension_present: true
        pension_type: {pick: ["an ERISA-governed private retirement plan", "a MainePERS public pension", "a 401(k) plan", "a federal civil-service pension"]}
        qdro_required: true
        qdro_drafted: false
        marital_portion_method: "coverture fraction (plan-practice convention, not a Maine statute)"
      issue:
        issue: "Pension division often needs a separate plan-compliant order (a federally compliant QDRO for ERISA plans; a MainePERS-compliant order for non-ERISA public plans) in addition to the judgment, depending on plan type"
        category: family
        governing_law: "19-A M.R.S. § 953; 5 M.R.S. § 17059 (MainePERS)"
        sub_questions:
          - "Is the plan a private ERISA plan (needs a separate federally compliant QDRO) or a MainePERS / other governmental or church plan (which is NOT an ERISA QDRO plan and instead takes its own plan-compliant order — for MainePERS, an order the chief executive officer must deem qualified under 5 M.R.S. § 17059)?"
          - "Has the plan-appropriate division order been drafted, pre-approved by the plan administrator, and entered with or after the judgment?"
        strength: moderate
        notes: "Overbroad-risk: not every plan needs a federal QDRO — a private ERISA plan generally requires a federally compliant QDRO, while MainePERS and other governmental plans are non-ERISA and require their OWN compliant division order or plan-approved language; for an ERISA plan the judgment alone CANNOT transfer benefits and missing the order before the participant retires or dies can extinguish the alternate payee's rights. The coverture-fraction marital-portion formula is plan practice, NOT verified Maine statutory text (UNVERIFIED / EXPERIMENTAL) — rely on the § 953 division hook and the plan's model order."
    # parental relocation notice / 60-mile trigger / DV court-routed branch
    - id: parental-relocation-notice
      weight: 2
      confidence: "High (the 30-day notice and 60-mile presumption are explicit); Medium (rebuttal standards are case-specific)"
      source: "19-A M.R.S. § 1653(14); § 1657 (relocation notice; DV safety exception routes notice through the court)"
      facts:
        relocation_contemplated: true
        relocation_distance_miles: {int_between: [12, 240]}
        relocation_crosses_state_line: {pick: [true, false]}
        days_notice_required: 30
        dv_safety_concern: false
        notice_route: "direct 30-day notice to the other parent (no DV-safety concern in this matter); a DV-safety concern would route notice through the court instead"
      issue:
        issue: "Parental relocation: the 30-day notice, the 60-mile presumption, and the motion-to-modify vehicle"
        category: family
        governing_law: "19-A M.R.S. § 1653(14); § 1657"
        sub_questions:
          - "Is the move more than 60 miles from either party's residence, raising the rebuttable presumption of disrupted parent-child contact?"
          - "Is relief sought by a motion to MODIFY the existing order rather than a new complaint, and has the 30-day notice been given correctly?"
        strength: moderate
        notes: "Overbroad-risk: the 60-mile trigger is a REBUTTABLE PRESUMPTION of substantial change, not a ban; the vehicle is a motion to modify, not a new complaint; and where notice would endanger the relocating parent or child, notice routes through the COURT (which provides safe notice) — direct 30-day notice must NEVER be hardcoded in a DV case."
