id: divorce-hidden-crypto
title: "Divorce of {plaintiff_full_name} and {defendant_full_name} (Concealed Digital Assets)"
practice_area: family
case_type: divorce
status: active
docket_prefix: FM

downstream:
  repo: maine-court-forms
  example_forms: [FM-004, FM-043, FM-050]

jurisdiction:
  state: ME
  county: random
  court_type: District Court

dates:
  filing_date: {date_between: ["2025-04-01", "2026-02-01"]}
  event_date: "{separation_date}"

# A high-asset Maine divorce in which the defendant spouse is concealing marital
# wealth in cryptocurrency. The plaintiff (the client) fights to find, value, and
# divide the hidden coins through forensic tracing, exchange subpoenas, and
# discovery sanctions. Deepens the basic divorce with a modern asset-concealment battle.
parties:
  client_role: plaintiff
  attorney: true
  children: {min: 0, max: 2}
  roles:
    - {key: plaintiff, label: "Plaintiff (spouse seeking full disclosure, the client)"}
    - {key: defendant, label: "Defendant (spouse concealing assets)"}

facts:
  marriage_date: {date_between: ["2008-01-01", "2018-12-31"]}
  marriage_place: {pick: ["Portland, Maine", "Bangor, Maine", "Bar Harbor, Maine", "Camden, Maine", "Brunswick, Maine"]}
  separation_date: {date_between: ["2024-09-01", "2025-09-30"]}
  grounds: {pick: ["irreconcilable differences", "irreconcilable marital differences"]}
  marital_estate_value: {int_between: [600000, 9000000]}
  suspected_crypto_value: {int_between: [80000, 3500000]}
  crypto_assets: {pick: ["Bitcoin held on a hardware wallet", "Bitcoin and Ethereum across several wallets", "a mix of Bitcoin, Ethereum, and stablecoins", "Bitcoin plus tokens earned from a startup"]}
  concealment_tactic: {pick: ["moving coins to an offline hardware wallet", "claiming the private keys were lost in a 'boating accident'", "claiming the crypto was bought after separation", "routing funds through a foreign exchange", "transferring to a wallet the other spouse never knew about"]}
  known_exchange: {pick: ["Coinbase", "Kraken", "Gemini", "Binance.US"]}
  marital_business: {pick: ["a software startup that paid the defendant in tokens", "a consulting LLC", "a small fintech venture"]}
  forensic_expert_retained: {pick: [true]}
  discovery_noncompliance: {pick: [true]}
  disclosed_on_financial_statement: {pick: [false]}

third_parties:
  count: {min: 3, max: 5}
  pool:
    - {type: financial_institution, name: "Coinbase, Inc.", role: "Cryptocurrency exchange", relevance: "Holds the defendant's account and KYC records reachable by subpoena."}
    - {type: business_entity, name_kind: organization, role: "Blockchain-forensics investigation firm", relevance: "Retained to trace wallet activity and follow the coins on-chain."}
    - {type: business_entity, name_kind: organization, role: "Marital business that paid the defendant in tokens", relevance: "Source of token compensation that never reached the financial statement."}
    - {type: employer, name_kind: employer, role: "Defendant's employer", relevance: "Pays the defendant's salary and reportedly some compensation in digital assets."}
    - {type: witness, name_kind: person, role: "Parties' accountant", relevance: "Prepared the parties' joint tax returns and may know of the crypto activity."}
    - {type: financial_institution, name_kind: bank, role: "Bank where fiat moved before crypto purchases", relevance: "Records show dollars leaving joint accounts to fund exchange deposits."}

fact_pattern:
  summary: "{plaintiff_full_name} petitions to divorce {defendant_full_name} in {county} County District Court on the ground of {grounds_lower} and asks the court to find, value, and equitably divide the marital estate, including roughly ${suspected_crypto_value} in cryptocurrency the plaintiff alleges {defendant_first} concealed by {concealment_tactic_lower}."
  narrative:
    - "{plaintiff_full_name} and {defendant_full_name} were married on {marriage_date} and separated on {separation_date}. Over the marriage the parties built a substantial estate worth an estimated ${marital_estate_value}, including the value generated through {marital_business_lower}. {plaintiff_first} now seeks a divorce on the ground of {grounds_lower} and an equitable division of all marital property."
    - "{plaintiff_first} alleges that {defendant_first} has hidden a significant share of the marital wealth in cryptocurrency, specifically {crypto_assets_lower}, worth roughly ${suspected_crypto_value}. The plaintiff contends {defendant_first} concealed these holdings by {concealment_tactic_lower} and that the digital assets never appeared on the defendant's sworn family financial statement (FM-043)."
    - "After the defendant's incomplete disclosures, {plaintiff_first} retained a blockchain forensic analyst and a forensic accountant, subpoenaed records from the {known_exchange} account, and now asks the court to compel full disclosure of all digital assets, to treat the dissipated or concealed crypto as marital property in the division, and to impose discovery sanctions and an adverse inference for the concealment."
  undisputed:
    - "The parties were married on {marriage_date} and separated on {separation_date}."
    - "The defendant filed a family financial statement (FM-043) in the divorce."
    - "The plaintiff retained a blockchain forensic analyst and a forensic accountant to investigate the marital estate."
  disputed:
    - "Whether the defendant owns cryptocurrency worth approximately ${suspected_crypto_value} and concealed it from the marital financial disclosures."
    - "Whether any digital assets are marital property or were acquired after separation as the defendant's separate property."
    - "Whether the defendant dissipated or hid marital assets such that the division should be adjusted and sanctions imposed."
    - "The proper valuation date for the cryptocurrency given its volatility."
  timeline:
    - {date: "{marriage_date}", event: "{plaintiff_first} and {defendant_first} married."}
    - {date: "{separation_date}", event: "The parties separated."}
    - {date: "{filing_date}", event: "Complaint for divorce filed in {court_location} District Court; full financial disclosure demanded."}

interview:
  interviewer: "Intake Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Goal", question: "What outcome are you hoping for?", answer: "I want every marital asset on the table and fairly divided, including the cryptocurrency I am sure {defendant_first} is hiding. I am not trying to take more than half, I just want my half of what we actually have."}
    - {topic: "The crypto", question: "What do you know about the cryptocurrency?", answer: "{defendant_first} got deep into crypto during the marriage and at one point bragged about {crypto_assets_lower}. Now {defendant_first} says it is basically gone, supposedly by {concealment_tactic_lower}. I think it is worth around ${suspected_crypto_value}."}
    - {topic: "Lifestyle", question: "Does your lifestyle match what is being disclosed?", answer: "No. We lived very well and our estate is easily worth ${marital_estate_value}, but the financial statement {defendant_first} filed makes it look like there is almost nothing left. The numbers do not add up."}
    - {topic: "The business", question: "Tell me about the business and how it paid out.", answer: "A lot of our money ran through {marital_business_lower}. Some of {defendant_first}'s compensation came as tokens, not a normal paycheck, and I do not think any of that was ever reported to me or on the disclosures."}
    - {topic: "The money trail", question: "Do you have any way to trace the money?", answer: "I pulled some bank statements and you can see money leaving our joint accounts going to {known_exchange}. After that the trail goes onto the blockchain, which is why I need a forensic expert."}
    - {topic: "The kids", question: "How are the children doing?", answer: "I want to keep them stable through all of this. The fight over the money should not spill onto them, and I do not want their routine disrupted."}

objectives:
  goals:
    - "Find, value, and equitably divide ALL marital assets, including the cryptocurrency the plaintiff alleges the defendant concealed."
    - "Obtain a finding of dissipation or economic misconduct, an adverse inference, and an award of attorney fees for the concealment."
    - "Protect the children's stability throughout the proceeding."
  priorities:
    - "Full forensic disclosure and tracing of all digital assets."
    - "An equitable division that accounts for the hidden or dissipated crypto."
    - "Sanctions and fees that make the concealment costly for the defendant."
  risk_tolerance: moderate
  desired_outcomes:
    - "A property division that captures the plaintiff's fair share of the concealed cryptocurrency."
    - "An adverse inference and fee award for the defendant's non-disclosure."
  non_starters:
    - "Any settlement that leaves the suspected cryptocurrency unaccounted for."
    - "Any arrangement that destabilizes the children."
  constraints:
    budget: {pick: ["Substantial; the client will fund the forensic work needed to trace the coins.", "Moderate; willing to invest in forensics but wants fees shifted to the defendant where possible."]}
    timeline: "Wants the digital assets traced and frozen before they can be moved again."

issues:
  count: {min: 4, max: 6}
  pool:
    - {issue: "The defendant's duty of full and accurate disclosure of marital assets on the court financial statement (FM-043)", category: family, governing_law: "M.R. Civ. P. 26; Maine family financial statement (FM-043) disclosure duty", sub_questions: ["Did the defendant's financial statement omit known cryptocurrency holdings?", "What sanction follows from an incomplete or false disclosure?"], strength: strong, client_position: "The defendant's sworn financial statement omitted the crypto and must be corrected and supplemented under oath."}
    - {issue: "Dissipation and economic misconduct as a factor in the equitable division of marital property", category: family, governing_law: "19-A M.R.S. § 953", sub_questions: ["Did the defendant dissipate or conceal marital assets?", "How should an unequal division account for the misconduct?"], strength: strong, client_position: "The defendant's concealment is economic misconduct that should shift the division in the plaintiff's favor."}
    - {issue: "Classification and valuation of cryptocurrency as marital property", category: family, governing_law: "19-A M.R.S. § 953(1)", sub_questions: ["Are the digital assets marital or non-marital?", "What is the value of the holdings and as of what date?"], strength: moderate, client_position: "Crypto acquired during the marriage is marital property subject to division at a fair valuation date."}
    - {issue: "Discovery sanctions for concealment and non-disclosure, including an adverse inference, fees, and preclusion", category: family, governing_law: "M.R. Civ. P. 37", sub_questions: ["Has the defendant failed to comply with disclosure obligations?", "Are an adverse inference, attorney fees, or preclusion warranted?"], strength: strong, client_position: "The defendant's non-compliance warrants an adverse inference, fee-shifting, and preclusion of late-disclosed defenses."}
    - {issue: "Contempt for violation of the court's disclosure and preservation orders", category: family, governing_law: "M.R. Civ. P. 66", sub_questions: ["Did the defendant violate a disclosure or preservation order?", "Is a contempt remedy appropriate?"], strength: moderate, client_position: "If the defendant moved or hid assets in defiance of an order, contempt should follow."}
    - {issue: "The valuation date for the cryptocurrency given its volatility", category: family, governing_law: "19-A M.R.S. § 953", sub_questions: ["Should the court value the crypto at separation, filing, or division?", "How is volatility accounted for in the award?"], strength: moderate, client_position: "The court should pick a valuation date that does not let the defendant benefit from timing the volatility."}

experts:
  count: {min: 2, max: 3}
  pool:
    - {field: "Blockchain forensic analysis", credentials: "CFE", retained_by: plaintiff, topic: "Tracing wallet activity and identifying concealed holdings", opinion: "On-chain analysis links the defendant's exchange account to wallets holding marital cryptocurrency.", basis: "Exchange KYC records, on-chain transaction graphs, and clustering analysis."}
    - {field: "Forensic accounting", credentials: "CPA, CFF", retained_by: plaintiff, topic: "Valuation of the marital estate and tracing of fiat into crypto", opinion: "Funds left the joint accounts and were converted to cryptocurrency that was omitted from the disclosures.", basis: "Bank records, tax returns, and the financial statement."}
    - {field: "Business valuation", credentials: "ASA", retained_by: plaintiff, topic: "Valuation of the startup and the tokens it paid the defendant", opinion: "The startup's token compensation had material value that belongs in the marital estate.", basis: "Cap table, token grants, and comparable-market data."}

evidence:
  count: {min: 5, max: 8}
  pool:
    - {title: "Defendant's sworn family financial statement (FM-043)", type: affidavit, party: defendant, description: "The defendant's sworn financial statement, which omits the cryptocurrency holdings."}
    - {title: "Exchange account and KYC records", type: financial_record, party: plaintiff, description: "{known_exchange} account opening, KYC, and transaction records obtained by subpoena."}
    - {title: "Blockchain transaction traces and forensic report", type: document, party: plaintiff, description: "On-chain traces and the forensic analyst's report tying wallets to the defendant."}
    - {title: "Bank records showing fiat moved to the exchange", type: financial_record, party: plaintiff, description: "Joint-account statements showing dollars transferred to fund crypto purchases."}
    - {title: "Text and email references to crypto holdings", type: correspondence, party: plaintiff, description: "Messages in which the defendant references buying or holding cryptocurrency."}
    - {title: "Startup token-compensation records", type: financial_record, party: plaintiff, description: "Records of tokens the marital business paid the defendant as compensation."}
    - {title: "Device-forensics results showing wallet software", type: document, party: plaintiff, description: "Forensic imaging results showing wallet applications and keys on the defendant's devices."}
    - {title: "Parties' joint tax returns", type: financial_record, party: plaintiff, description: "Joint returns relevant to undisclosed income and digital-asset questions."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 3, max: 5}
  amounts:
    - {label: "Total marital estate value", amount: {int_between: [600000, 9000000]}, basis: "Estimated combined value of all marital property."}
    - {label: "Suspected hidden cryptocurrency value", amount: {int_between: [80000, 3500000]}, basis: "Plaintiff's estimate of the concealed digital assets."}
    - {label: "Traced or recovered cryptocurrency amount", amount: {int_between: [20000, 2000000]}, basis: "Value tied to identified wallets and exchange records."}
    - {label: "Forensic and expert costs", amount: {int_between: [25000, 250000]}, basis: "Blockchain forensic, accounting, and valuation fees."}
    - {label: "Attorney fees sought as a sanction", amount: {int_between: [15000, 300000]}, basis: "Fees attributable to the concealment and non-disclosure."}

litigation:
  posture: discovery
  causes_of_action:
    - {count: 1, claim: "Equitable division of the marital estate including the concealed cryptocurrency", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "19-A M.R.S. § 953", elements: ["A valid marriage", "Property acquired during the marriage", "Classification of marital versus non-marital property", "An equitable division"], relief_sought: "An equitable division that captures the plaintiff's share of the cryptocurrency", strength: strong}
    - {count: 2, claim: "A finding of dissipation and economic misconduct adjusting the division", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "19-A M.R.S. § 953", elements: ["Marital assets", "Concealment or dissipation by a spouse", "Loss to the marital estate", "An adjustment to the division"], relief_sought: "An unequal division favoring the plaintiff to account for the misconduct", strength: strong}
    - {count: 3, claim: "An order compelling full disclosure and an accounting of all digital assets", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "M.R. Civ. P. 26; FM-043 disclosure duty", elements: ["A duty of full financial disclosure", "An incomplete or false disclosure", "Materiality of the omitted assets"], relief_sought: "A sworn, complete accounting of all wallets, keys, and exchange accounts", strength: strong}
    - {count: 4, claim: "Discovery sanctions and an adverse inference for concealment", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "M.R. Civ. P. 37", elements: ["A discovery obligation", "Non-compliance or concealment", "Prejudice to the plaintiff"], relief_sought: "An adverse inference, attorney fees, and preclusion", strength: moderate}
  affirmative_defenses:
    n: {min: 2, max: 4}
    pick_n:
      - {defense: "The cryptocurrency was acquired after separation", by: "{defendant_full_name}", basis: "Any digital assets are post-separation acquisitions and not marital property."}
      - {defense: "The keys or coins are genuinely lost", by: "{defendant_full_name}", basis: "The private keys are irretrievably lost and the coins cannot be produced or valued."}
      - {defense: "The holdings are separate, non-marital property", by: "{defendant_full_name}", basis: "The cryptocurrency traces to non-marital funds and is the defendant's separate property."}
      - {defense: "The claimed value is overstated", by: "{defendant_full_name}", basis: "The plaintiff's valuation of the holdings is speculative and inflated."}
  discovery:
    n: {min: 4, max: 6}
    pick_n:
      - {type: interrogatories, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: objected, description: "Interrogatories specific to digital assets, wallets, and exchange accounts."}
      - {type: request_for_production, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: compelled, description: "Requests for exchange statements, wallet addresses, seed-phrase backups, and device records."}
      - {type: subpoena, propounding_party: "{plaintiff_full_name}", responding_party: "the cryptocurrency exchange", served_date: {date_between: ["2025-06-10", "2025-07-10"]}, status: served, description: "Subpoena to the cryptocurrency exchange for account and KYC records."}
      - {type: deposition, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-07-15", "2025-08-15"]}, status: outstanding, description: "Deposition of the defendant on the digital-asset holdings and disclosures."}
      - {type: independent_examination, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-08-20", "2025-09-20"]}, status: served, description: "Forensic imaging of the defendant's devices by a neutral examiner."}
      - {type: request_for_admission, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-09-25", "2025-10-25"]}, status: responded, description: "Admissions on the existence and control of specific wallets."}
  motions:
    n: {min: 3, max: 5}
    pick_n:
      - {title: "Motion to compel disclosure of digital assets", type: discovery, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-06-15", "2025-07-15"]}, status: granted, relief: "An order compelling full disclosure of wallets, keys, and exchange accounts."}
      - {title: "Motion for sanctions and an adverse inference", type: discovery, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-09-01", "2025-10-01"]}, status: under_advisement, relief: "An adverse inference and attorney fees for the concealment."}
      - {title: "Motion to appoint a neutral forensic examiner", type: discovery, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-07-20", "2025-08-20"]}, status: granted_in_part, relief: "Appointment of a neutral examiner to image the defendant's devices."}
      - {title: "Motion for contempt", type: enforcement, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-10-05", "2025-11-05"]}, status: filed, relief: "A finding of contempt for violating the disclosure order."}
      - {title: "Motion to freeze and preserve the cryptocurrency", type: injunctive, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-05-05", "2025-06-05"]}, status: opposed, relief: "An order preserving and freezing the identified digital assets."}
  docket:
    - {date: {date_between: ["2025-04-05", "2025-04-20"]}, entry: "Complaint for divorce filed with a demand for full financial disclosure.", party: "{plaintiff_full_name}"}
    - {date: {date_between: ["2025-05-05", "2025-05-20"]}, entry: "Defendant's family financial statement (FM-043) filed; plaintiff disputes its completeness.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2025-06-15", "2025-06-30"]}, entry: "Order compelling disclosure of digital assets entered.", party: "the court"}
    - {date: {date_between: ["2025-07-20", "2025-08-05"]}, entry: "Neutral forensic examiner appointed to image devices.", party: "the court"}
    - {date: {date_between: ["2025-09-01", "2025-09-20"]}, entry: "Plaintiff's forensic report and motion for sanctions served.", party: "{plaintiff_full_name}"}
    - {date: {date_between: ["2025-10-10", "2025-10-30"]}, entry: "Motion for sanctions and an adverse inference taken under advisement.", party: "the court"}
    - {date: {date_between: ["2025-11-15", "2025-12-05"]}, entry: "Pretrial conference held; valuation-date dispute reserved for trial.", party: "the court"}
  trial:
    jury: false
    estimated_days: {int_between: [2, 5]}
    scheduled_date: {date_between: ["2026-07-01", "2027-02-01"]}

# -------------------------------------------------------------------------
# LEGAL-ISSUE TIERING — confounding SECONDARY family-law issues layered on the
# primary concealed-asset divorce. Most matters draw ZERO. Each confounder
# injects coherent facts + a spotted issue (+ optional defense) with its Maine
# grounding and a confidence flag; AI-assembled research verified against
# legislature.maine.gov, NOT legal advice (see DISCLAIMER.md). Overbroad-risk is
# stated inline so the oracle is the CORRECT rule.
confounders:
  count: {weights: [60, 26, 11, 3]} # ~60% of matters stay clean
  pool:
    # classification / tracing / active appreciation of the disputed holdings
    - id: nonmarital-tracing-and-active-appreciation
      weight: 4
      confidence: "High (framework); Medium (the active-role boundary is UNSETTLED at the margins)"
      source: "19-A M.R.S. § 953 (marital presumption + four § 953(2) exclusions); Doucette v. Washburn, 2001 ME 38 (tracing); Hedges v. Pitcher, 2008 ME 55 (routine reinvestment is not a substantial active role)"
      facts:
        nonmarital_tracing_dispute: true
        claimed_separate_source: {pick: ["premarital savings", "an inheritance", "post-separation earnings"]}
        appreciation_during_marriage: true
        active_management_by_spouse: true
        tracing_required: true
      issue:
        issue: "Tracing and the active-appreciation rule for the disputed digital-asset and business holdings"
        category: family
        governing_law: "19-A M.R.S. § 953; Doucette v. Washburn, 2001 ME 38; Hedges v. Pitcher, 2008 ME 55"
        sub_questions:
          - "Do the holdings trace to a § 953(2) exclusion (premarital, inherited, or post-separation), or to marital funds and effort?"
          - "Did a spouse take a 'substantial active role' in managing or improving the asset, converting appreciation to marital, or is it passive market appreciation that stays separate?"
        strength: moderate
        notes: "Overbroad-risk: § 953(1) presumes property acquired during the marriage MARITAL regardless of title — the claimant bears the tracing burden; appreciation of a non-marital asset stays non-marital ONLY absent a substantial active role (routine reinvestment is not such a role, Hedges v. Pitcher); transmutation and commingling are resolved by tracing, not an express statute."
    # retirement/pension division + QDRO sub-document (coverture UNVERIFIED)
    - id: retirement-division-qdro-subdocument
      weight: 3
      confidence: "High that retirement division OFTEN requires a separate plan-compliant order in ADDITION to judgment language — a federally compliant QDRO for a private ERISA plan, or a MainePERS-compliant division order for a public plan; the required instrument depends on the plan type (MainePERS and some governmental/church plans are not ERISA QDRO plans). UNVERIFIED / EXPERIMENTAL that the coverture-fraction marital-portion formula is explicit Maine STATUTORY text (derived from plan practice / the MainePERS model DRO, not a statute)"
      source: "19-A M.R.S. § 953 (division); 5 M.R.S. § 17059 (MainePERS division-order regime); a private ERISA plan requires a separate federally compliant QDRO, while a MainePERS or other governmental/church plan is not an ERISA QDRO plan and takes its own plan-compliant order; coverture fraction per MainePERS model DRO (NOT a statute)"
      facts:
        retirement_plan_present: true
        pension_type: {pick: ["an ERISA-governed private retirement plan", "a MainePERS public pension", "a 401(k) plan", "a federal civil-service pension"]}
        qdro_required: true
        qdro_drafted: false
        marital_portion_method: "coverture fraction (plan-practice convention, not a Maine statute)"
      issue:
        issue: "Retirement division often needs a separate plan-compliant division order (a QDRO for ERISA plans; a MainePERS-compliant order for public plans) in addition to the judgment, depending on plan type"
        category: family
        governing_law: "19-A M.R.S. § 953; 5 M.R.S. § 17059 (MainePERS)"
        sub_questions:
          - "Is the plan a private ERISA plan (needs a separate federally compliant QDRO) or a MainePERS / other governmental or church plan (which is NOT an ERISA QDRO plan and instead takes its own plan-compliant division order — for MainePERS, an order the chief executive officer must deem qualified under 5 M.R.S. § 17059)?"
          - "Has the plan-appropriate division order been drafted, pre-approved by the plan administrator, and entered with or after the judgment?"
        strength: moderate
        notes: "Overbroad-risk: it is NOT universally true that 'a retirement plan needs a separate QDRO' — a federal QDRO applies to private ERISA plans, while MainePERS and some governmental/church plans are not ERISA QDRO plans and require their own plan-compliant order; for an ERISA plan the judgment alone CANNOT transfer benefits and missing the order before the participant retires or dies can extinguish the alternate payee's rights. The coverture-fraction marital-portion formula is plan practice, NOT verified Maine statutory text (UNVERIFIED / EXPERIMENTAL)."
    # child-support deviation + imputed income (gated to matters with children)
    - id: child-support-deviation-and-imputed-income
      weight: 3
      requires: {num_children_words: [one, two]}
      confidence: "High (statute); Medium (factor weighting is case-specific)"
      source: "19-A M.R.S. § 2006 (income-shares guidelines + worksheet); § 2007 (deviation; written proposed findings; ~17 factors)"
      facts:
        deviation_proposed: {pick: [true, false]}
        imputed_income_issue: true
        deviation_factor: {pick: ["a party's actual standard of living exceeding reported income", "extraordinary transportation costs", "the child's standard of living during the marriage"]}
        written_deviation_findings_required: true
      issue:
        issue: "Child-support computation with imputed income and a possible guideline deviation"
        category: family
        governing_law: "19-A M.R.S. § 2006; § 2007"
        sub_questions:
          - "Where reported income understates a party's resources, should income be imputed before the § 2006 worksheet is applied?"
          - "If a deviation is sought, are the § 2007 written proposed findings prepared?"
        strength: moderate
        notes: "Overbroad-risk: a deviation requires an EXPLICIT § 2007 written-findings block — silently adjusting the guideline number yields a defective order; imputing income for under-reported earnings or voluntary unemployment is litigation-heavy and fact-specific."
