id: improvident-transfer
title: "{plaintiff_last} v. {defendant_last} et al. (Improvident Transfer of Title)"
practice_area: probate
case_type: improvident_transfer
status: active
docket_prefix: CV

downstream:
  repo: maine-court-forms
  example_forms: [CV-001, RE-QT]

jurisdiction:
  state: ME
  county: random
  court_type: Superior Court

# A Maine action under the Improvident Transfers of Title Act (33 M.R.S. ch. 20):
# an elderly, dependent person deeded the family home/farm to a caretaker (or one
# child / a late-life companion) for far less than full value, without independent
# counsel, in a confidential or fiduciary relationship. The statute raises a
# PRESUMPTION of undue influence; capacity to convey at the time is also questioned.
# The suit, brought through a conservator/next friend, seeks to void the deed and
# restore the property to the transferor.
parties:
  client_role: plaintiff
  attorney: true
  roles:
    - {key: plaintiff, label: "Plaintiff (the elderly transferor, acting through a conservator/next friend)"}
    - {key: defendant, label: "Defendant transferee (caretaker / child / companion who received the deed)"}
    - {key: defendant_2, label: "Defendant (co-transferee or spouse of the transferee)"}
    - {key: other_party, label: "Interested adult child of the transferor"}

dates:
  filing_date: {date_between: ["2025-04-01", "2026-02-01"]}
  event_date: "{transfer_date}"

facts:
  transferor_age: {int_between: [78, 93]}
  dependency_basis: {pick: ["depends on others for daily care and transportation", "relies on the transferee for meals, medication, and finances", "is homebound and dependent after a stroke"]}
  relationship_to_transferee: {pick: ["a paid caretaker", "the youngest child who moved in", "a late-life companion", "a neighbor who became a caregiver"]}
  property_transferred: {pick: ["the family farm and farmhouse", "the longtime family home", "a shorefront cottage and lot", "a multi-unit home the family had owned for decades"]}
  fair_market_value: {int_between: [240000, 1300000]}
  consideration_paid: {pick: ["one dollar and 'love and affection'", "a nominal sum far below value", "an unfulfilled promise of lifetime care", "no money at all"]}
  independent_counsel: {pick: [false]}
  confidential_relationship: {pick: [true]}
  competency_questioned: {pick: [true]}
  transfer_date: {date_between: ["2023-01-01", "2024-12-31"]}
  medical_condition: {pick: ["early-stage dementia", "cognitive decline after a stroke", "mild cognitive impairment"]}

third_parties:
  count: {min: 3, max: 5}
  pool:
    - {type: healthcare_provider, name_kind: person, role: "Transferor's primary physician", relevance: "Treated the transferor around the time of the deed and can speak to the transferor's cognition and capacity to understand and execute a conveyance."}
    - {type: fiduciary, name_kind: person, role: "Conservator / guardian ad litem", relevance: "Appointed to act for the transferor and to bring or oversee this action to recover the property on the transferor's behalf."}
    - {type: witness, name_kind: person, role: "Notary and witnesses to the deed", relevance: "Notarized and witnessed the deed and can testify to the circumstances, the transferor's apparent condition, and who was present at signing."}
    - {type: family_member, name_kind: person, role: "Other adult child of the transferor", relationship: "Sibling of the transferee and child of the transferor", relevance: "An interested heir who was excluded from the transaction and supports setting the deed aside."}
    - {type: government_agency, name: "Maine Adult Protective Services", role: "Adult Protective Services", relevance: "State agency that may hold a report concerning the transferor's safety and possible financial exploitation."}
    - {type: witness, name_kind: person, role: "Attorney who drafted the deed, if any", relevance: "Prepared or recorded the deed and may bear on whether the transferor had any independent advice about the conveyance."}
    - {type: financial_institution, name_kind: bank, role: "Bank holding the transferor's accounts", relevance: "Holds the transferor's deposit and savings accounts whose records show the depletion of the transferor's remaining assets."}

fact_pattern:
  summary: "Acting through a conservator/next friend, {plaintiff_full_name}, an elderly and dependent person, sues to void a deed of {property_transferred} to {defendant_full_name}, {relationship_to_transferee}, made for {consideration_paid_lower} without independent counsel, invoking the statutory presumption of undue influence under Maine's Improvident Transfers of Title Act."
  narrative:
    - "{plaintiff_full_name} is {transferor_age} years old and, by the time of the transfer, {dependency_basis}. {plaintiff_first} had come to rely on {defendant_full_name}, {relationship_to_transferee}, for day-to-day support, placing the two in a relationship of trust and confidence. Around the same period, {plaintiff_first} was living with {medical_condition_lower}."
    - "On or about {transfer_date}, {plaintiff_first} executed a deed conveying {property_transferred} to {defendant_full_name} (joined by {defendant_2_full_name}) in exchange for {consideration_paid_lower}, although the property was worth roughly ${fair_market_value}. {plaintiff_first} had no independent attorney advising {plaintiff_first} about the conveyance, and the transaction was arranged within the caretaking relationship rather than at arm's length."
    - "The transfer came to light when {other_party_full_name}, an adult child of the transferor, learned the home had been signed away. A conservator was sought to protect {plaintiff_first}, and this action followed in {county} County Superior Court. Because an elderly dependent person made a major transfer of real property, for less than full consideration, in a confidential relationship, and without independent counsel, the Improvident Transfers of Title Act presumes the transfer was the product of undue influence and the plaintiff asks the court to set the deed aside, impose a constructive trust, and return the property."
  undisputed:
    - "{plaintiff_full_name} executed a deed conveying {property_transferred} to {defendant_full_name} on or about {transfer_date}."
    - "{plaintiff_full_name} was an elderly person who, at the time of the deed, depended on others for care."
    - "{plaintiff_full_name} was not separately represented by an attorney of {plaintiff_first}'s own in the transaction."
  disputed:
    - "Whether the deed is presumptively the product of undue influence and whether the transferee can rebut that presumption."
    - "Whether {plaintiff_full_name} had the mental capacity to understand and execute the conveyance when it was signed."
    - "Whether the value of any care provided amounted to full and fair consideration for {property_transferred}."
  timeline:
    - {date: "{transfer_date}", event: "{plaintiff_first} executed the deed conveying {property_transferred} to {defendant_full_name}."}
    - {date: "{filing_date}", event: "Complaint to void the transfer prepared for filing in {court_location} Superior Court."}

interview:
  interviewer: "Intake Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Goal", question: "As conservator, what outcome are you seeking for the transferor?", answer: "I want the home put back. The deed should be undone so {property_transferred} returns to the person it belongs to, and I want to make sure nothing else is lost while we sort this out."}
    - {topic: "The relationship", question: "What was the relationship between the transferor and the person who received the deed?", answer: "The transferee was {relationship_to_transferee}. The transferor had really come to depend on them for everything day to day, so there was a lot of trust there, maybe too much."}
    - {topic: "The transfer", question: "What do you understand about how the deed came about?", answer: "The transferor signed over {property_transferred} for {consideration_paid_lower}, even though it is worth a great deal. There was no lawyer on the transferor's side, and the family did not know until afterward."}
    - {topic: "Capacity", question: "What was the transferor's condition around that time?", answer: "Around then the transferor was dealing with {medical_condition_lower}, and {dependency_basis}. I have real doubts they fully understood what signing the deed meant."}
    - {topic: "The other family", question: "How does the rest of the family see this?", answer: "Another of the children flagged it and is with me on this. We are not trying to start a feud, but the home should not have left this way."}
    - {topic: "Risk", question: "How do you feel about the cost and difficulty of litigation?", answer: "I am cautious. I am acting for a vulnerable person, so I want to be careful and protect what is left rather than gamble. Still, this needs to be put right."}

objectives:
  goals:
    - "Void the deed and return {property_transferred} to the transferor and the transferor's estate."
    - "Protect the transferor's remaining assets and benefits from further depletion."
    - "Hold the transferee accountable for any improper benefit obtained through the transfer."
  priorities:
    - "Recovering the home and undoing the improvident transfer."
    - "Safeguarding the elder's dignity and remaining resources."
    - "A clean, well-supported record establishing the statutory presumption."
  risk_tolerance: low
  desired_outcomes:
    - "Rescission of the deed and an order, or constructive trust, restoring the property to the transferor."
    - "Preservation of the transferor's remaining accounts and benefits."
  non_starters:
    - "Any resolution that leaves the home with the transferee or sacrifices the elder's security."
  constraints:
    budget: {pick: ["Limited; the conservator wants an efficient path to undo the transfer and protect the estate.", "Modest; the conservator will fund a capacity evaluation and an appraisal but wants costs kept reasonable."]}
    timeline: "Wants the property secured and the deed challenged promptly before the transferor's interests erode further."

issues:
  count: {min: 4, max: 6}
  pool:
    - {issue: "Statutory presumption of undue influence on a major transfer by an elderly dependent person", category: probate, governing_law: "33 M.R.S. § 1022", sub_questions: ["Was the transferor an elderly dependent person who made a major transfer for less than full consideration?", "Did a confidential or fiduciary relationship and the absence of independent counsel trigger the presumption of undue influence?"], strength: strong, client_position: "The transfer satisfies every statutory element, so undue influence is presumed and the deed should be set aside."}
    - {issue: "Available relief: rescission, a constructive trust, and an order returning the property", category: probate, governing_law: "33 M.R.S. § 1023", sub_questions: ["Is rescission or reformation of the deed warranted?", "Should the court impose a constructive trust and order the property returned to the transferor?"], strength: strong, client_position: "The court should rescind the deed, impose a constructive trust, and order the property returned."}
    - {issue: "Whether the transaction is a 'major transfer' by an 'elderly dependent person' within the statute", category: probate, governing_law: "33 M.R.S. § 1021", sub_questions: ["Does the conveyance of the home or farm qualify as a major transfer of real property?", "Does the transferor meet the statutory definition of an elderly dependent person?"], strength: strong, client_position: "The conveyance of the family real estate by a dependent elder squarely fits the statutory definitions."}
    - {issue: "Common-law lack of capacity to convey", category: probate, governing_law: "Common law; capacity to execute a deed", sub_questions: ["Did the transferor understand the nature and effect of the conveyance when it was signed?", "Does the medical and cognitive evidence show a lack of capacity?"], strength: moderate, client_position: "The transferor's cognitive condition left {plaintiff_first} without the capacity to make a knowing conveyance."}
    - {issue: "Common-law undue influence", category: probate, governing_law: "Common law undue influence", sub_questions: ["Did the transferee use the relationship of trust to overcome the transferor's free will?", "Do the surrounding circumstances independently show undue influence?"], strength: moderate, client_position: "Apart from the statute, the transferee exploited a relationship of trust to procure the deed."}
    - {issue: "The transferee's burden to rebut the presumption of undue influence", category: probate, governing_law: "33 M.R.S. § 1022", sub_questions: ["What must the transferee prove to rebut the presumption?", "Can the transferee show the transfer was fair, voluntary, and well understood?"], strength: moderate, client_position: "The transferee cannot carry the burden of showing the transfer was fair, voluntary, and fully understood."}
    - {issue: "Timeliness of the action under the statute of limitations", category: probate, governing_law: "33 M.R.S. § 1024", sub_questions: ["Was the action brought within the statutory period?", "Does the transferor's condition affect the limitations analysis?"], strength: moderate, client_position: "The action is timely under the statute governing improvident transfers."}

experts:
  count: {min: 1, max: 3}
  pool:
    - {field: "Geriatric psychiatry / neuropsychology", credentials: "M.D.", retained_by: plaintiff, topic: "The transferor's capacity at the time of the transfer", opinion: "At the time of the deed, the transferor's cognitive condition impaired the capacity to understand and knowingly execute a conveyance of real property.", basis: "Clinical examination, cognitive testing, and review of the contemporaneous medical record."}
    - {field: "Real estate appraisal", credentials: "MAI", retained_by: plaintiff, topic: "Fair market value versus the consideration paid", opinion: "The property's fair market value at the time of transfer greatly exceeded the consideration the transferor received.", basis: "Sales-comparison analysis as of the date of the deed."}
    - {field: "Forensic accounting", credentials: "CPA, CFF", retained_by: plaintiff, topic: "Tracing the transferor's finances and the use of assets", opinion: "Account records show the transferor's resources were depleted in and around the period of the transfer.", basis: "Bank statements, ledgers, and transaction histories."}

evidence:
  count: {min: 4, max: 7}
  pool:
    - {title: "Recorded deed and closing/transfer documents", type: public_record, party: plaintiff, description: "The recorded deed and any transfer paperwork conveying the property to the transferee."}
    - {title: "Transferor's medical and cognitive records", type: medical_record, party: plaintiff, description: "Medical records and cognitive evaluations bearing on the transferor's capacity around the time of the deed."}
    - {title: "Appraisal showing value far above the consideration", type: financial_record, party: plaintiff, description: "Appraisal of the property's fair market value contrasted with the consideration actually paid."}
    - {title: "Transferor's financial and bank records", type: financial_record, party: plaintiff, description: "Bank and account records showing the transferor's finances and any depletion of assets."}
    - {title: "Correspondence and notes from the caretaking relationship", type: correspondence, party: defendant, description: "Letters, messages, and notes reflecting the relationship between the transferor and the transferee."}
    - {title: "Conservatorship and competency filings", type: document, party: plaintiff, description: "The conservatorship petition and any competency or capacity filings concerning the transferor."}
    - {title: "Affidavits from family and neighbors", type: affidavit, party: plaintiff, description: "Sworn statements from family members and neighbors describing the transferor's condition and the circumstances of the transfer."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 3, max: 5}
  amounts:
    - {label: "Fair market value of the property", amount: {int_between: [240000, 1300000]}, basis: "Appraised fair market value at the time of the transfer."}
    - {label: "Consideration actually paid", amount: {int_between: [0, 15000]}, basis: "The nominal amount, if any, the transferor received."}
    - {label: "Claimed value of care services offered as consideration", amount: {int_between: [0, 120000]}, basis: "Asserted value of care the transferee says was provided."}
    - {label: "Transferor's depleted accounts", amount: {int_between: [0, 90000]}, basis: "Remaining balances in the transferor's accounts."}
    - {label: "Estimated cost of cognitive and appraisal experts", amount: {int_between: [15000, 80000]}, basis: "Retained capacity, valuation, and accounting experts."}

litigation:
  posture: pleadings
  causes_of_action:
    - {count: 1, claim: "Improvident transfer / statutory presumption of undue influence", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "33 M.R.S. § 1022; 33 M.R.S. § 1021", elements: ["The transferor was an elderly dependent person", "Who made a major transfer of property for less than full consideration", "In a confidential or fiduciary relationship and without independent counsel", "Triggering a presumption of undue influence the transferee must rebut"], relief_sought: "Rescission of the deed and an order setting the transfer aside under 33 M.R.S. § 1023", strength: strong}
    - {count: 2, claim: "Common-law undue influence", by: "{plaintiff_full_name}", against: "{defendant_full_name} and {defendant_2_full_name}", governing_law: "Common law undue influence", elements: ["A relationship of trust and confidence", "Susceptibility of the transferor to influence", "Opportunity and disposition to exert influence", "A transfer that reflects the influence rather than the transferor's free will"], relief_sought: "An order voiding the deed as the product of undue influence", strength: moderate}
    - {count: 3, claim: "Lack of capacity to convey", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "Common law; capacity to execute a deed", elements: ["The transferor executed the deed", "While lacking the mental capacity to understand its nature and effect", "Due to the transferor's cognitive condition", "Rendering the conveyance voidable"], relief_sought: "A declaration that the deed is void for want of capacity", strength: moderate}
    - {count: 4, claim: "Imposition of a constructive trust", by: "{plaintiff_full_name}", against: "{defendant_full_name} and {defendant_2_full_name}", governing_law: "33 M.R.S. § 1023; common law", elements: ["The transferee holds title obtained through an improvident transfer", "Retention of the property would unjustly enrich the transferee", "Equity requires the property be held for the transferor", "A constructive trust is the appropriate remedy"], relief_sought: "Imposition of a constructive trust and an order returning the property to the transferor", strength: moderate}
    - {count: 5, claim: "Conversion of personal property", by: "{plaintiff_full_name}", against: "{defendant_full_name}", governing_law: "Common law conversion", elements: ["The transferor owned personal property and funds", "The transferee exercised dominion over them", "Without authorization and inconsistent with the transferor's rights", "Causing the transferor loss"], relief_sought: "Damages for the value of personal property and funds converted", strength: moderate}
  affirmative_defenses:
    n: {min: 3, max: 5}
    pick_n:
      - {defense: "Competent and freely given gift", by: "{defendant_full_name}", basis: "The transferor competently and voluntarily intended the conveyance as a gift."}
      - {defense: "Full and fair consideration through years of care", by: "{defendant_full_name}", basis: "Years of care and support furnished by the transferee were full and fair consideration for the transfer."}
      - {defense: "The transferor understood the transaction", by: "{defendant_full_name}", basis: "The transferor understood the nature and effect of the deed and was advised of the transaction. 33 M.R.S. § 1022."}
      - {defense: "Statute of limitations", by: "{defendant_full_name}", basis: "The action was not commenced within the period allowed for challenging the transfer. 33 M.R.S. § 1024."}
      - {defense: "Ratification", by: "{defendant_full_name}", basis: "The transferor ratified and confirmed the conveyance after it was made."}
  counterclaims:
    - {count: 1, claim: "Quantum meruit for the value of care provided", by: "{defendant_full_name}", against: "{plaintiff_full_name}", relief: "Compensation for the reasonable value of care and services furnished to the transferor if the deed is set aside."}
  discovery:
    n: {min: 3, max: 5}
    pick_n:
      - {type: interrogatories, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Interrogatories on the circumstances of the transfer and the relationship of trust."}
      - {type: request_for_production, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Requests for financial records and signed medical authorizations for the transferor's records."}
      - {type: deposition, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-06-05", "2025-07-15"]}, status: outstanding, description: "Depositions of the transferee, the notary, and the treating physician."}
      - {type: independent_examination, propounding_party: "{plaintiff_full_name}", responding_party: "{defendant_full_name}", served_date: {date_between: ["2025-06-05", "2025-07-15"]}, status: served, description: "A court-ordered evaluation of the transferor's capacity at the relevant time."}
      - {type: subpoena, propounding_party: "{plaintiff_full_name}", responding_party: "the transferor's bank", served_date: {date_between: ["2025-05-01", "2025-06-01"]}, status: served, description: "Subpoena to the bank for the transferor's account records."}
  motions:
    n: {min: 2, max: 4}
    pick_n:
      - {title: "Motion for a constructive trust and lis pendens", type: provisional, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-04-15", "2025-05-15"]}, status: filed, relief: "A constructive trust and a recorded lis pendens preserving the property pending judgment."}
      - {title: "Motion to compel the transferor's medical records", type: discovery, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-06-15", "2025-07-15"]}, status: granted, relief: "An order compelling production of the transferor's medical and cognitive records."}
      - {title: "Motion for partial summary judgment establishing the presumption", type: dispositive, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-09-01", "2025-10-15"]}, status: under_advisement, relief: "A ruling that the statutory presumption of undue influence applies."}
      - {title: "Motion for appointment of a guardian ad litem", type: procedural, movant: "{plaintiff_full_name}", filed_date: {date_between: ["2025-04-15", "2025-05-15"]}, status: granted, relief: "Appointment of a guardian ad litem to protect the transferor's interests."}
  docket:
    - {date: {date_between: ["2025-04-05", "2025-04-25"]}, entry: "Complaint to void the transfer and demand for relief filed.", party: "{plaintiff_full_name}"}
    - {date: {date_between: ["2025-05-10", "2025-05-30"]}, entry: "Answer and counterclaim for the value of care filed.", party: "{defendant_full_name}"}
    - {date: {date_between: ["2025-06-05", "2025-06-25"]}, entry: "Order appointing a guardian ad litem for the transferor entered.", party: "the court"}
    - {date: {date_between: ["2025-07-05", "2025-07-25"]}, entry: "Order compelling the transferor's medical records entered.", party: "the court"}
    - {date: {date_between: ["2025-09-05", "2025-09-25"]}, entry: "Court-ordered capacity evaluation completed and report served.", party: "the court"}
    - {date: {date_between: ["2025-11-05", "2025-11-25"]}, entry: "Hearing held on the motion establishing the statutory presumption.", party: "the court"}
  trial:
    jury: {pick: [true, false]}
    estimated_days: {int_between: [3, 7]}
    scheduled_date: {date_between: ["2026-08-01", "2027-03-01"]}
