id: residential-eviction
title: "{plaintiff_full_name} v. {defendant_full_name} (eviction)"
practice_area: civil
case_type: forcible_entry_detainer
status: pre_filing
docket_prefix: FED

downstream:
  repo: maine-court-forms
  example_forms: [CV-007, CV-100, CV-195]

jurisdiction:
  state: ME
  county: random
  court_type: District Court

dates:
  filing_date: {date_between: ["2025-11-01", "2026-05-15"]}
  event_date: "{notice_to_quit_date}"

# A residential Forcible Entry and Detainer (eviction) action. CV-007 consumes the
# canonical namespace directly; its fact keys (premises_address, months_in_arrears,
# notice_to_quit_date, ...) are emitted by name for a clean native fill.
parties:
  client_role: plaintiff
  attorney: true
  roles:
    - {key: plaintiff, label: "Plaintiff (landlord)"}
    - {key: defendant, label: "Defendant (tenant)"}

facts:
  premises_address: {pick: ["22 Tidewater Lane, Apt 3", "108 Birch Street, Unit B", "5 Quarry Street, Apt 2", "76 Spruce Avenue, Unit 4"]}
  premises_city: {pick: ["Portland", "Lewiston", "Bangor", "Biddeford", "Augusta"]}
  monthly_rent: {int_between: [950, 2600]}
  notice_to_quit_date: {date_between: ["2025-10-01", "2026-04-15"]}
  other_attachment: {pick: ["", "Copy of the written lease attached", "Rent ledger attached"]}
  section8_tenancy: {pick: [false, false, true]}

# Coherent eviction bundles. The quit ground, the notice it requires under 14
# M.R.S. § 6002, the tenancy it presupposes, and the arrears must agree — an
# at-will termination is a 30-day notice with no rent claim; a nonpayment quit is
# a 7-day notice whose owed amount tracks the rent and months behind. quit_ground
# is emitted as the ground-truth discriminator value the fillers were guessing.
variants:
  # nonpayment of rent — 7-day notice, § 6002(1) (most common)
  - weight: 4
    quit_ground: nonpayment
    eviction_basis: "nonpayment of rent"
    notice_type: "7-day notice to quit for nonpayment of rent"
    tenancy_type: {pick: ["a written one-year lease", "a month-to-month tenancy at will", "an expired lease continuing month-to-month"]}
    months_in_arrears: {int_between: [1, 6]}
    total_rent_owed: {mul: ["{monthly_rent}", "{months_in_arrears}"]}
    other_eviction_basis: ""
  # termination of a tenancy at will — 30-day notice, § 6002(1); no rent claim
  - weight: 2
    quit_ground: at_will
    eviction_basis: "termination of a tenancy at will"
    notice_type: "30-day notice to terminate a tenancy at will"
    tenancy_type: "a month-to-month tenancy at will"
    months_in_arrears: 0
    total_rent_owed: 0
    other_eviction_basis: ""
  # material lease violation — 7-day notice, § 6002(1)(B)
  - weight: 1
    quit_ground: lease_violation
    eviction_basis: "material lease violation"
    notice_type: "7-day notice to quit for a material lease violation"
    tenancy_type: {pick: ["a written one-year lease", "an expired lease continuing month-to-month"]}
    months_in_arrears: 0
    total_rent_owed: 0
    other_eviction_basis: {pick: ["Repeated disturbances affecting other tenants", "Unauthorized occupants in the unit"]}

third_parties:
  count: {min: 2, max: 4}
  pool:
    - {type: business_entity, name_kind: organization, role: "Property management company", relevance: "Manages the building and documented the nonpayment."}
    - {type: government_agency, name: "Local code enforcement office", role: "Code authority", relevance: "Relevant if the tenant raises a warranty-of-habitability defense."}
    - {type: government_agency, name: "Regional housing authority", role: "Section 8 administrator", relevance: "Administers the tenant's housing voucher, if any."}
    - {type: witness, name_kind: person, role: "Neighboring tenant", relevance: "Can testify to disturbances or occupancy."}
    - {type: witness, name_kind: person, role: "Process server / sheriff's deputy", relevance: "Serves the summons and any writ of possession."}

fact_pattern:
  summary: "{plaintiff_full_name} seeks to evict {defendant_full_name} from {premises_address}, {premises_city} based on {eviction_basis}, having served a {notice_type} on {notice_to_quit_date}."
  narrative:
    - "{plaintiff_full_name} rents the residential unit at {premises_address} in {premises_city}, Maine to {defendant_full_name} under {tenancy_type} at ${monthly_rent} per month. The tenant is approximately {months_in_arrears} month(s) behind, owing about ${total_rent_owed}."
    - "The landlord served a {notice_type} on {notice_to_quit_date}. The notice period has expired and the tenant remains in possession, so the landlord now brings a Forcible Entry and Detainer action seeking a judgment for possession (and, where allowed, unpaid rent)."
    - "The case proceeds as summary process in the District Court. The tenant may raise defenses such as breach of the implied warranty of habitability or improper notice, which the court must resolve before issuing a writ of possession."
  undisputed:
    - "{defendant_full_name} occupies the unit at {premises_address}, {premises_city}."
    - "A {notice_type} was served on {notice_to_quit_date}."
  disputed:
    - "The exact amount of rent owed and any setoff for conditions."
    - "Whether the premises met the implied warranty of habitability."
    - "Whether the notice was proper in form and timing."

interview:
  interviewer: "Landlord-Tenant Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Tenancy", question: "What is the rental arrangement?", answer: "{tenancy_type} at ${monthly_rent} a month for the unit at {premises_address}."}
    - {topic: "Default", question: "What is the problem?", answer: "The tenant is about {months_in_arrears} months behind, owing roughly ${total_rent_owed}. The basis is {eviction_basis}."}
    - {topic: "Notice", question: "What notice did you give?", answer: "I served a {notice_type} on {notice_to_quit_date}, and the period has run."}
    - {topic: "Defenses", question: "Has the tenant complained about conditions?", answer: "There may be a habitability argument; I want to be ready for it."}
    - {topic: "Goal", question: "What do you want?", answer: "Possession of the unit, and the unpaid rent if the court will award it."}

objectives:
  goals:
    - "Obtain a judgment for possession of the premises."
    - "Recover unpaid rent where the court allows it in the FED action."
    - "Secure a writ of possession if the tenant does not vacate."
  priorities:
    - "Proper notice and service to avoid dismissal."
    - "Possession of the unit."
  risk_tolerance: moderate
  desired_outcomes:
    - "A judgment for possession and issuance of a writ if needed."
  non_starters:
    - "A defective notice that forces the case to be refiled."
  constraints:
    budget: "Cost-conscious; the landlord wants a prompt, clean summary process."
    timeline: "Wants possession before the unit's carrying costs mount further."

issues:
  count: {min: 3, max: 4}
  pool:
    - {issue: "Sufficiency of the notice to quit", category: landlord_tenant, governing_law: "14 M.R.S. § 6002", sub_questions: ["Was the correct 7-day or 30-day notice used and properly served?"], strength: moderate, client_position: "Contends the notice was proper in form and timing."}
    - {issue: "Grounds for forcible entry and detainer", category: landlord_tenant, governing_law: "14 M.R.S. § 6001", sub_questions: ["Is there a valid statutory ground for eviction?", "Is there any claim of retaliation?"], strength: strong}
    - {issue: "Implied warranty of habitability as a defense", category: landlord_tenant, governing_law: "14 M.R.S. § 6021", sub_questions: ["Did conditions breach the warranty?", "Is a rent setoff warranted?"], strength: moderate}
    - {issue: "Issuance and execution of the writ of possession", category: landlord_tenant, governing_law: "14 M.R.S. § 6005", sub_questions: ["When may the writ issue after judgment?"], strength: strong}

evidence:
  count: {min: 3, max: 5}
  pool:
    - {title: "Written lease or rental agreement", type: contract, party: plaintiff, description: "Governs the tenancy and rent."}
    - {title: "Notice to quit with proof of service", type: public_record, party: plaintiff, description: "The served notice that starts the clock."}
    - {title: "Rent ledger", type: financial_record, party: plaintiff, description: "Payment history showing the arrearage."}
    - {title: "Photographs of the premises", type: photo, party: defendant, description: "Relevant to any habitability defense."}
    - {title: "Tenant communications", type: correspondence, party: plaintiff, description: "Messages about rent and conditions."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 2, max: 3}
  amounts:
    - {label: "Monthly rent", amount: {int_between: [950, 2600]}, basis: "Lease."}
    - {label: "Total rent owed", amount: {int_between: [950, 15000]}, basis: "Rent ledger."}
    - {label: "Estimated unit carrying cost per month", amount: {int_between: [600, 2200]}, basis: "Mortgage, taxes, and utilities."}

litigation:
  posture: pleadings
  motions:
    - {title: "Request for issuance of writ of possession", type: post_judgment, movant: "{plaintiff_full_name}", filed_date: "{filing_date}", status: filed, relief: "A writ directing the tenant's removal if the judgment is not satisfied."}
  affirmative_defenses:
    n: {min: 1, max: 2}
    pick_n:
      - {defense: "Breach of the implied warranty of habitability", by: "{defendant_full_name}", basis: "Alleged uninhabitable conditions justifying a rent setoff. 14 M.R.S. § 6021."}
      - {defense: "Defective or untimely notice", by: "{defendant_full_name}", basis: "The notice to quit did not comply with 14 M.R.S. § 6002."}
      - {defense: "Retaliatory eviction", by: "{defendant_full_name}", basis: "Eviction allegedly in response to a complaint. 14 M.R.S. § 6001."}
