id: residential-eviction
title: "{plaintiff_full_name} v. {defendant_full_name} (eviction)"
practice_area: civil
case_type: forcible_entry_detainer
status: pre_filing
docket_prefix: FED

downstream:
  repo: maine-court-forms
  example_forms: [CV-007, CV-100, CV-195]

jurisdiction:
  state: ME
  county: random
  court_type: District Court

dates:
  filing_date: {date_between: ["2025-11-01", "2026-05-15"]}
  event_date: "{notice_to_quit_date}"

# A residential Forcible Entry and Detainer (eviction) action. CV-007 consumes the
# canonical namespace directly; its fact keys (premises_address, months_in_arrears,
# notice_to_quit_date, ...) are emitted by name for a clean native fill.
parties:
  client_role: plaintiff
  attorney: true
  roles:
    - {key: plaintiff, label: "Plaintiff (landlord)"}
    - {key: defendant, label: "Defendant (tenant)"}

facts:
  premises_address: {pick: ["22 Tidewater Lane, Apt 3", "108 Birch Street, Unit B", "5 Quarry Street, Apt 2", "76 Spruce Avenue, Unit 4"]}
  premises_city: {pick: ["Portland", "Lewiston", "Bangor", "Biddeford", "Augusta"]}
  monthly_rent: {int_between: [950, 2600]}
  notice_to_quit_date: {date_between: ["2025-10-01", "2026-04-15"]}
  other_attachment: {pick: ["", "Copy of the written lease attached", "Rent ledger attached"]}

# Coherent eviction bundles. The quit ground, the notice it requires under 14
# M.R.S. § 6002, the tenancy it presupposes, and the arrears must agree — an
# at-will termination is a 30-day notice with no rent claim; a nonpayment quit is
# a 7-day notice whose owed amount tracks the rent and months behind. quit_ground
# is emitted as the ground-truth discriminator value the fillers were guessing.
variants:
  # nonpayment of rent — 7-day notice, § 6002(1) (most common)
  - weight: 4
    quit_ground: nonpayment
    eviction_basis: "nonpayment of rent"
    notice_type: "7-day notice to quit for nonpayment of rent"
    tenancy_type: {pick: ["a written one-year lease", "a month-to-month tenancy at will", "an expired lease continuing month-to-month"]}
    months_in_arrears: {int_between: [1, 6]}
    total_rent_owed: {mul: ["{monthly_rent}", "{months_in_arrears}"]}
    other_eviction_basis: ""
    section8_tenancy: false
  # termination of a tenancy at will — 30-day notice, § 6002(1); no rent claim
  - weight: 2
    quit_ground: at_will
    eviction_basis: "termination of a tenancy at will"
    notice_type: "30-day notice to terminate a tenancy at will"
    tenancy_type: "a month-to-month tenancy at will"
    months_in_arrears: 0
    total_rent_owed: 0
    other_eviction_basis: ""
    section8_tenancy: false
  # material lease violation — 7-day notice, § 6002(1)(B)
  - weight: 1
    quit_ground: lease_violation
    eviction_basis: "material lease violation"
    notice_type: "7-day notice to quit for a material lease violation"
    tenancy_type: {pick: ["a written one-year lease", "an expired lease continuing month-to-month"]}
    months_in_arrears: 0
    total_rent_owed: 0
    other_eviction_basis: {pick: ["Repeated disturbances affecting other tenants", "Unauthorized occupants in the unit"]}
    section8_tenancy: false
  # EDGE CASE (plausible, uncommon): a Section 8 voucher tenant. A no-cause
  # at-will termination is NOT available — federal law (24 C.F.R. § 982.310) and
  # the HAP contract require GOOD CAUSE and the longer of the lease/voucher notice
  # periods, and the housing authority must be notified. Decision point: the
  # landlord cannot use the ordinary 30-day no-cause path. nonpayment here is the
  # tenant's share only.
  - weight: 1
    quit_ground: nonpayment_section8
    eviction_basis: "nonpayment of the tenant's share of rent under a Section 8 Housing Choice Voucher tenancy"
    notice_type: "notice to quit for nonpayment with good cause, copied to the housing authority"
    tenancy_type: "a Section 8 Housing Choice Voucher tenancy under a HAP contract"
    months_in_arrears: {int_between: [1, 3]}
    total_rent_owed: {mul: ["{monthly_rent}", "{months_in_arrears}"]}
    other_eviction_basis: "Good cause required; housing authority notified under the HAP contract"
    section8_tenancy: true

# ---------------------------------------------------------------------------
# LEGAL-ISSUE TIERING — confounding SECONDARY issues layered on the primary
# quit_ground above. Most matters draw ZERO (the weights keep a clean matter the
# common case); any one exotic issue is rare. Each confounder injects coherent
# ground-truth facts + a spotted issue + (where apt) an affirmative defense, and
# carries its Maine grounding + a confidence flag. Sources verified against
# legislature.maine.gov; AI-assembled research, NOT legal advice (see
# DISCLAIMER.md). Overbroad-application risk is stated inline so the engine's
# oracle is the CORRECT Maine rule, not a naive over-claim.
confounders:
  count: {weights: [55, 28, 13, 4]}   # ~55% of matters stay clean
  pool:
    - id: standing-real-party
      weight: 5
      confidence: "well-settled core (proper plaintiff / entity-counsel); the particular owner-lessor mismatch is fact-specific"
      source: "14 M.R.S. § 6001(1); Bureau v. Gendron, 783 A.2d 643 (Me. 2001); 4 M.R.S. § 807; M.R. Civ. P. 17, 80D"
      facts:
        landlord_entity_type: {pick: [multi_member_llc, corporation]}
        record_owner_entity: "a real-estate holding company"
        lease_signatory_entity: "a different, affiliated entity"
        owner_matches_lessor: false
        landlord_self_represented: true
        standing_question: true
      issue:
        issue: "Standing / real party in interest, and entity self-representation"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6001(1); Bureau v. Gendron, 783 A.2d 643 (Me. 2001); 4 M.R.S. § 807; M.R. Civ. P. 17"
        sub_questions:
          - "Is the named plaintiff the party entitled to immediate possession, or does the holding-company owner differ from the entity that signed the lease without an explained assignment/acknowledgment?"
          - "May this entity appear without counsel, or does 4 M.R.S. § 807 require an attorney (the sole-member-LLC exception is narrow)?"
        strength: moderate
      defense:
        defense: "Real party in interest / authority to maintain the FED / unauthorized entity appearance"
        by: "{defendant_full_name}"
        basis: "The entity that owns the premises is not the entity that signed the lease, and an LLC/corporation generally must appear through counsel. 14 M.R.S. § 6001(1); 4 M.R.S. § 807. NOTE: an owner/lessor mismatch is NOT itself proof of no standing — agency, assignment, successor status, management authority, or acceptance of rent can establish the immediate possessory right; record title is not always required."
    - id: waiver-by-noncollection
      weight: 3
      requires: {quit_ground: nonpayment}
      confidence: "fact-specific / NOT codified — common-law waiver-estoppel that courts often reject"
      source: "common-law waiver / estoppel / modification; contrast 14 M.R.S. § 6002 (acceptance of money does not affect a 30-day no-cause notice until the writ issues)"
      facts:
        months_no_rent_collected: {int_between: [10, 30]}
        landlord_sent_invoices: false
        tenant_claims_waiver: true
      issue:
        issue: "Whether long non-collection of rent waived or modified the rent obligation, undercutting the stated arrears"
        category: landlord_tenant
        governing_law: "Common-law waiver / estoppel / implied modification (not an FED statute)"
        sub_questions:
          - "Did years of neither charging nor collecting rent signal the parties treated rent as not owed?"
          - "If so, is the arrears figure in the 7-day notice overstated, making the notice defective?"
        strength: weak
      defense:
        defense: "Waiver / estoppel / modification of the rent obligation"
        by: "{defendant_full_name}"
        basis: "The landlord neither charged nor collected rent for about {months_no_rent_collected} months. NOTE (overbroad-risk): mere delay or non-collection is NOT enough — waiver, estoppel, accord, or implied modification needs proof of an agreement, intentional relinquishment, or detrimental reliance; the argument frequently fails, and acceptance of rent does NOT auto-waive a Maine 30-day no-cause notice (14 M.R.S. § 6002)."
    - id: retaliation-tenant-complaint
      weight: 3
      requires: {quit_ground: at_will}
      confidence: "well-settled statute (presumption + 6-month window); the § 6002(1)/lease-violation carve-out is large"
      source: "14 M.R.S. § 6001(3) (esp. (3)(B) code-officer complaint); § 6001(4); § 6026"
      facts:
        tenant_code_complaint: true
        code_complaint_recipient: town_code_officer
        code_complaint_date: {date_between: ["2025-08-01", "2026-01-15"]}
        days_between_complaint_and_fed: {int_between: [20, 160]}
      issue:
        issue: "Rebuttable presumption of retaliatory eviction"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6001(3)"
        sub_questions:
          - "Did the tenant complain to a code-enforcement officer within 6 months before the FED, raising the presumption?"
          - "Can the landlord rebut it with a legitimate non-retaliatory cause? (No writ may issue absent rebuttal.)"
        strength: moderate
      defense:
        defense: "Retaliatory eviction (statutory presumption)"
        by: "{defendant_full_name}"
        basis: "The no-cause FED follows the tenant's code complaint within 6 months. 14 M.R.S. § 6001(3). NOTE: the presumption does NOT apply where the FED is for a § 6002(1) ground or a lease violation, unless the tenant asserted § 6026."
    - id: landlord-code-violation-eviction
      weight: 2
      confidence: "statute well-settled; the inverse-twist OUTCOME is fact-specific"
      source: "14 M.R.S. § 6001(3) exception; § 6002(1)(B) (nuisance / violation of a law regarding the tenancy)"
      facts:
        landlord_received_town_fine_notice: true
        town_fine_subject: {pick: [grounded_boat, camper, accumulated_junk]}
        tenant_code_complaint: false
        eviction_recast_as: "6002(1)(B) law-violation / nuisance"
      issue:
        issue: "Whether retaliation protection is available where the landlord's OWN code-violation exposure drove the eviction"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6001(3) exception; § 6002(1)(B)"
        sub_questions:
          - "Did the TENANT engage in protected activity? The landlord's own exposure to municipal code enforcement is NOT tenant protected activity — if the tenant made no protected complaint, no § 6001(3) presumption arises at all."
          - "If the FED is framed as a § 6002(1)(B) law-violation/nuisance ground, the § 6001(3) exception removes the presumption — but is that stated cause bona fide, or a pretext?"
        strength: moderate
    - id: habitability-bedbugs
      weight: 4
      confidence: "§ 6021 / § 6021-A elements well-settled; indeterminate-origin cost allocation is fact-specific"
      source: "14 M.R.S. § 6021 (5-element warranty); § 6021-A (bedbugs: 5-day inspect / 10-day pest-control / cooperation cost-shift); § 6026 (narrow repair-and-deduct)"
      facts:
        condition_type: bedbugs
        bedbug_origin: indeterminate
        condition_caused_by_tenant: indeterminate
        tenant_cooperated_with_treatment: false
        landlord_inspected_within_5_days: {pick: [true, false]}
      issue:
        issue: "Implied warranty of habitability — bedbugs of indeterminate origin worsened by the tenant"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6021; § 6021-A"
        sub_questions:
          - "Was the condition caused by the tenant or someone under the tenant's control (§ 6021(3)(B)), and was the tenant current in rent (§ 6021(3)(E))?"
          - "Did the landlord meet the § 6021-A 5-day inspect / 10-day pest-control duties, and does cost shift to an uncooperative tenant (§ 6021-A(3)(C))?"
        strength: moderate
      defense:
        defense: "Breach of the implied warranty of habitability"
        by: "{defendant_full_name}"
        basis: "Bedbug infestation the landlord failed to address under 14 M.R.S. § 6021-A. NOTE (overbroad-risk): Maine has NO general rent-withholding — the tenant must be current in rent to assert the warranty (§ 6021(3)(E)), and indeterminate origin plus tenant non-cooperation can shift treatment cost to the tenant."
    - id: abandoned-property-postwrit
      weight: 2
      confidence: "well-settled statute"
      source: "14 M.R.S. § 6013 (safe/dry storage; first-class mail + itemized list; 7-day claim / 14-day retrieval; no ransom for early claim)"
      facts:
        property_left_behind_anticipated: true
        property_has_market_value: {pick: [true, false]}
      issue:
        issue: "Post-judgment disposition of personal property the tenant leaves behind"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6013"
        sub_questions:
          - "Has the landlord met the § 6013 storage, itemized-notice, and 7-/14-day deadlines before disposing of or selling the property?"
          - "Has the landlord avoided conditioning early release on back rent (prohibited)?"
        strength: moderate
    - id: unusual-dwelling-camper-boat
      weight: 1
      confidence: "UNSETTLED / fact-specific — HIGH overbroad-risk; no Maine appellate case squarely on point. EXPERIMENTAL."
      source: "14 M.R.S. § 6021(1) 'dwelling unit'; § 6001/§ 6002; 10 M.R.S. § 9097-B (parks); 30-A § 3837 (campground); 38 M.R.S. § 9 (abandoned watercraft)"
      facts:
        dwelling_type: {pick: [camper_rv, grounded_boat]}
        premises_address: {pick: ["Site 14, Pinecrest Camping Area", "a grounded vessel moored at 9 Shoreline Way", "an RV on the back lot at 220 County Road"]}
        structure_owned_by: tenant
        rents_land_only: true
        correct_instrument_question: true
      issue:
        issue: "Is this even an FED? Camper / grounded-boat occupancy — tenancy vs license, personal property vs fixture, and which regime governs"
        category: landlord_tenant
        governing_law: "14 M.R.S. § 6021(1); § 6001/§ 6002; 10 M.R.S. § 9097-B; 30-A § 3837; 38 M.R.S. § 9"
        sub_questions:
          - "Is the camper/boat 'rented for human habitation' with a true tenancy, or a license / campground patronage?"
          - "Which regime governs is NOT determinable from the dwelling type alone — it turns on tenancy-vs-license, land-vs-structure rental, park/campground status, attachment/fixture facts, and abandonment facts (FED vs replevin/abandoned-chattel vs mobile-home-park vs abandoned-watercraft vs campground self-help). Genuinely unsettled — EXPERIMENTAL."
        strength: unknown

third_parties:
  count: {min: 2, max: 4}
  pool:
    - {type: business_entity, name_kind: organization, role: "Property management company", relevance: "Manages the building and documented the nonpayment."}
    - {type: government_agency, name: "Local code enforcement office", role: "Code authority", relevance: "Relevant if the tenant raises a warranty-of-habitability defense."}
    - {type: government_agency, name: "Regional housing authority", role: "Section 8 administrator", relevance: "Administers the tenant's housing voucher, if any."}
    - {type: witness, name_kind: person, role: "Neighboring tenant", relevance: "Can testify to disturbances or occupancy."}
    - {type: witness, name_kind: person, role: "Process server / sheriff's deputy", relevance: "Serves the summons and any writ of possession."}

fact_pattern:
  summary: "{plaintiff_full_name} seeks to evict {defendant_full_name} from {premises_address}, {premises_city} based on {eviction_basis}, having served a {notice_type} on {notice_to_quit_date}."
  narrative:
    - "{plaintiff_full_name} rents the residential unit at {premises_address} in {premises_city}, Maine to {defendant_full_name} under {tenancy_type} at ${monthly_rent} per month. The tenant is approximately {months_in_arrears} month(s) behind, owing about ${total_rent_owed}."
    - "The landlord served a {notice_type} on {notice_to_quit_date}. The notice period has expired and the tenant remains in possession, so the landlord now brings a Forcible Entry and Detainer action seeking a judgment for possession (and, where allowed, unpaid rent)."
    - "The case proceeds as summary process in the District Court. The tenant may raise defenses such as breach of the implied warranty of habitability or improper notice, which the court must resolve before issuing a writ of possession."
  undisputed:
    - "{defendant_full_name} occupies the unit at {premises_address}, {premises_city}."
    - "A {notice_type} was served on {notice_to_quit_date}."
  disputed:
    - "The exact amount of rent owed and any setoff for conditions."
    - "Whether the premises met the implied warranty of habitability."
    - "Whether the notice was proper in form and timing."

interview:
  interviewer: "Landlord-Tenant Attorney"
  interviewee_role: plaintiff
  exchanges:
    - {topic: "Tenancy", question: "What is the rental arrangement?", answer: "{tenancy_type} at ${monthly_rent} a month for the unit at {premises_address}."}
    - {topic: "Default", question: "What is the problem?", answer: "The tenant is about {months_in_arrears} months behind, owing roughly ${total_rent_owed}. The basis is {eviction_basis}."}
    - {topic: "Notice", question: "What notice did you give?", answer: "I served a {notice_type} on {notice_to_quit_date}, and the period has run."}
    - {topic: "Defenses", question: "Has the tenant complained about conditions?", answer: "There may be a habitability argument; I want to be ready for it."}
    - {topic: "Goal", question: "What do you want?", answer: "Possession of the unit, and the unpaid rent if the court will award it."}

objectives:
  goals:
    - "Obtain a judgment for possession of the premises."
    - "Recover unpaid rent where the court allows it in the FED action."
    - "Secure a writ of possession if the tenant does not vacate."
  priorities:
    - "Proper notice and service to avoid dismissal."
    - "Possession of the unit."
  risk_tolerance: moderate
  desired_outcomes:
    - "A judgment for possession and issuance of a writ if needed."
  non_starters:
    - "A defective notice that forces the case to be refiled."
  constraints:
    budget: "Cost-conscious; the landlord wants a prompt, clean summary process."
    timeline: "Wants possession before the unit's carrying costs mount further."

issues:
  count: {min: 3, max: 4}
  pool:
    - {issue: "Sufficiency of the notice to quit", category: landlord_tenant, governing_law: "14 M.R.S. § 6002", sub_questions: ["Was the correct 7-day or 30-day notice used and properly served?"], strength: moderate, client_position: "Contends the notice was proper in form and timing."}
    - {issue: "Grounds for forcible entry and detainer", category: landlord_tenant, governing_law: "14 M.R.S. § 6001", sub_questions: ["Is there a valid statutory ground for eviction?", "Is there any claim of retaliation?"], strength: strong}
    - {issue: "Implied warranty of habitability as a defense", category: landlord_tenant, governing_law: "14 M.R.S. § 6021", sub_questions: ["Did conditions breach the warranty?", "Is a rent setoff warranted?"], strength: moderate}
    - {issue: "Issuance and execution of the writ of possession", category: landlord_tenant, governing_law: "14 M.R.S. § 6005", sub_questions: ["When may the writ issue after judgment?"], strength: strong}

evidence:
  count: {min: 3, max: 5}
  pool:
    - {title: "Written lease or rental agreement", type: contract, party: plaintiff, description: "Governs the tenancy and rent."}
    - {title: "Notice to quit with proof of service", type: public_record, party: plaintiff, description: "The served notice that starts the clock."}
    - {title: "Rent ledger", type: financial_record, party: plaintiff, description: "Payment history showing the arrearage."}
    - {title: "Photographs of the premises", type: photo, party: defendant, description: "Relevant to any habitability defense."}
    - {title: "Tenant communications", type: correspondence, party: plaintiff, description: "Messages about rent and conditions."}

financials:
  currency: USD
  total_is_sum: false
  count: {min: 2, max: 3}
  amounts:
    - {label: "Monthly rent", amount: {int_between: [950, 2600]}, basis: "Lease."}
    - {label: "Total rent owed", amount: {int_between: [950, 15000]}, basis: "Rent ledger."}
    - {label: "Estimated unit carrying cost per month", amount: {int_between: [600, 2200]}, basis: "Mortgage, taxes, and utilities."}

litigation:
  posture: pleadings
  motions:
    - {title: "Request for issuance of writ of possession", type: post_judgment, movant: "{plaintiff_full_name}", filed_date: "{filing_date}", status: filed, relief: "A writ directing the tenant's removal if the judgment is not satisfied."}
  affirmative_defenses:
    n: {min: 1, max: 2}
    pick_n:
      - {defense: "Breach of the implied warranty of habitability", by: "{defendant_full_name}", basis: "Alleged uninhabitable conditions justifying a rent setoff. 14 M.R.S. § 6021."}
      - {defense: "Defective or untimely notice", by: "{defendant_full_name}", basis: "The notice to quit did not comply with 14 M.R.S. § 6002."}
      - {defense: "Retaliatory eviction", by: "{defendant_full_name}", basis: "Eviction allegedly in response to a complaint. 14 M.R.S. § 6001."}
