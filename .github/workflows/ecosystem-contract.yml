name: ecosystem-contract

on:
  workflow_call:
    inputs:
      repository:
        required: false
        type: string
        default: ""
      scenario:
        required: false
        type: string
        default: ""

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[test]"
      - name: Verify catalog contract
        run: mmcg catalog verify
      - name: Run targeted ecosystem fixtures
        shell: bash
        run: |
          args=(ecosystem-smoke --out out/ecosystem)
          if [[ -n "${{ inputs.repository }}" ]]; then args+=(--repository "${{ inputs.repository }}"); fi
          if [[ -n "${{ inputs.scenario }}" ]]; then args+=(--scenario "${{ inputs.scenario }}"); fi
          mmcg "${args[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ecosystem-contract-report
          path: out/ecosystem/
